<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
{% include "_header_css.html" %}
<style>
:root{--white:#fff;--g0:#f4f5f8;--g1:#eceef3;--g2:#d5d9e4;--g3:#a8b0c5;--g4:#6b7898;--g5:#414e6a;--g6:#28334d;--g7:#0f1623;--blue:#1a46c4;--blue-lt:#eef2ff;--blue-md:#5b82f5;--emr:#056944;--emr-lt:#eafaf4;--emr-md:#2db87e;--red:#aa1c1c;--red-lt:#fef2f2;--amber:#964a06;--purple:#7c3aed;--purple-lt:#f5f3ff;--sans:'Nunito Sans',sans-serif;--mono:'JetBrains Mono',monospace;--topbar-h:54px;--row-h:34px;--pad:12px;--tree-line:rgba(168,176,197,.35)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--g0);color:var(--g7);font-family:var(--sans);font-size:14px;overflow:hidden}
.app{display:flex;flex-direction:column;height:calc(100dvh - 40px);height:calc(100vh - 40px)}
@supports(height:100dvh){.app{height:calc(100dvh - 40px)}}
/* Mobile hybrid scroll: trick browser into hiding address bar.
   Add a tiny spacer after .app so body has 1px scrollable content.
   When user scrolls the table, JS propagates a tiny body scroll to trigger address bar hide.
   Table-wrap keeps its own scroll context for sticky thead/tfoot/first-col. */
.app.hybrid-scroll{height:calc(100vh - 40px);height:calc(100dvh - 40px)}
@supports(height:100dvh){.app.hybrid-scroll{height:calc(100dvh - 40px)}}
.hybrid-spacer{height:1px;flex-shrink:0}

/* Column resize grip — visible handle on right edge of NV/KH column */
.col-grip{position:absolute;right:-1px;top:0;bottom:0;width:16px;cursor:col-resize;z-index:40;display:flex;align-items:center;justify-content:center;touch-action:none}
.col-grip::before{content:'⋮';font-size:14px;color:var(--g3);font-weight:900;line-height:1;transition:color .15s}
.col-grip:hover::before,.col-grip.active::before{color:var(--blue)}

/* TOPBAR */
.topbar{height:var(--topbar-h);background:var(--white);border-bottom:1px solid var(--g2);box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;padding:0 var(--pad);flex-shrink:0;z-index:50}
.brand{display:flex;align-items:center;gap:10px}.brand-mark{width:28px;height:28px;border-radius:7px;background:var(--blue);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(37,99,235,.35)}.brand-mark svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round}.brand-name{font-size:15px;font-weight:700}.brand-sub{font-size:12px;color:var(--g4)}
.topbar-right{display:flex;align-items:center;gap:8px}
.tbtn{height:32px;padding:0 12px;border-radius:6px;border:1px solid var(--g2);background:var(--white);font-family:var(--sans);font-size:12px;font-weight:600;color:var(--g5);cursor:pointer;transition:.12s;display:flex;align-items:center;gap:5px;white-space:nowrap}.tbtn:hover{border-color:var(--g3);background:var(--g0)}.tbtn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-linecap:round;flex-shrink:0}.tbtn.green{border-color:var(--emr-md);color:var(--emr)}.tbtn.green:hover{background:var(--emr-lt)}
.v-div{width:1px;height:20px;background:var(--g2)}
.status-chip{height:24px;padding:0 10px;border-radius:12px;display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;background:var(--g1);border:1px solid var(--g2);color:var(--g5);white-space:nowrap}
.s-dot{width:5px;height:5px;border-radius:50%;background:var(--g3)}.s-dot.ok{background:var(--emr)}.s-dot.err{background:var(--red)}.s-dot.busy{background:var(--amber);animation:pulse .9s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* PICKER (NV tree) */
.picker-wrap{position:relative}.picker-trigger{height:32px;padding:0 10px 0 30px;min-width:140px;background:var(--g0);border:1px solid var(--g2);border-radius:6px;font-family:var(--sans);font-size:13px;color:var(--g7);outline:none;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s;white-space:nowrap;position:relative}.picker-trigger:hover,.picker-trigger.open{border-color:var(--blue-md);background:var(--white)}.picker-trigger svg.ico-search{position:absolute;left:9px;width:13px;height:13px;stroke:var(--g4);fill:none;pointer-events:none}.picker-badge{display:inline-flex;align-items:center;justify-content:center;height:18px;min-width:18px;padding:0 5px;background:var(--blue);color:#fff;border-radius:9px;font-size:10px;font-weight:700;margin-left:auto}.picker-badge.all{background:var(--g3)}
.picker-panel{position:fixed;z-index:9990;background:var(--white);border:1px solid var(--g2);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.14);width:300px;display:none;flex-direction:column;overflow:hidden}.picker-panel.open{display:flex}.picker-head{padding:10px 12px 8px;border-bottom:1px solid var(--g1);display:flex;flex-direction:column;gap:7px}.picker-search-row{position:relative;display:flex;align-items:center}.picker-search-row svg{position:absolute;left:8px;width:12px;height:12px;stroke:var(--g4);fill:none;pointer-events:none}#picker-q{width:100%;height:30px;padding:0 8px 0 27px;background:var(--g0);border:1px solid var(--g2);border-radius:6px;font-family:var(--sans);font-size:12px;outline:none}#picker-q:focus{border-color:var(--blue-md)}.picker-actions{display:flex;gap:6px}.picker-act-btn{flex:1;height:26px;border-radius:5px;border:1px solid var(--g2);background:var(--g0);font-family:var(--sans);font-size:11px;font-weight:600;color:var(--g5);cursor:pointer}.picker-act-btn:hover{background:var(--blue-lt);color:var(--blue)}.picker-tree{overflow-y:auto;max-height:360px;padding:4px 0}
.pi{display:flex;align-items:center;height:32px;padding:0 12px;cursor:pointer;transition:background .08s;user-select:none}.pi:hover{background:var(--g0)}.pi-cb{width:15px;height:15px;flex-shrink:0;margin-right:8px;border:1.5px solid var(--g3);border-radius:3px;background:var(--white);position:relative;display:flex;align-items:center;justify-content:center}.pi.checked .pi-cb{background:var(--blue);border-color:var(--blue)}.pi.indeterm .pi-cb{background:var(--blue-lt);border-color:var(--blue-md)}.pi.checked .pi-cb::after{content:'';position:absolute;width:8px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translate(1px,-1px)}.pi.indeterm .pi-cb::after{content:'';position:absolute;width:7px;height:2px;background:var(--blue);border-radius:1px}.pi-tog{width:16px;height:16px;margin-right:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:3px;color:var(--g3);cursor:pointer}.pi-tog:hover{background:var(--g1);color:var(--g5)}.pi-tog svg{width:8px;height:8px;stroke:currentColor;fill:none;stroke-linecap:round}.pi-tog-sp{width:20px;flex-shrink:0}.pi-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;font-size:12.5px;white-space:nowrap}.pi-name.lv0{font-weight:700}.pi-name.lv1{font-weight:600}.pi-name em{background:#fef9c3;font-style:normal;border-radius:2px}
.picker-foot{border-top:1px solid var(--g1);padding:8px 12px;display:flex;justify-content:flex-end;gap:6px}.picker-apply{height:28px;padding:0 14px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer}.picker-close{height:28px;padding:0 12px;background:var(--g0);border:1px solid var(--g2);border-radius:6px;font-size:12px;font-weight:600;color:var(--g5);cursor:pointer}

/* KH SEARCH with suggestions */
.kh-search-wrap{position:relative;display:flex;align-items:center;background:var(--g0);border:1px solid var(--g2);border-radius:6px;height:32px;padding:0 8px 0 28px}.kh-search-wrap:focus-within{border-color:var(--emr-md);background:var(--white)}.kh-search-wrap svg{position:absolute;left:9px;width:13px;height:13px;stroke:var(--g4);fill:none;pointer-events:none}#kh-q{width:160px;border:none;background:transparent;font-family:var(--sans);font-size:13px;outline:none}.kh-clear{border:none;background:none;color:var(--g3);cursor:pointer;font-size:12px;padding:0 0 0 4px}.kh-clear:hover{color:var(--red)}
.kh-suggest{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--white);border:1px solid var(--g2);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.12);z-index:80;max-height:200px;overflow-y:auto;display:none}
.kh-suggest.show{display:block}
.kh-suggest-item{padding:8px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--g1);display:flex;justify-content:space-between;align-items:center}.kh-suggest-item:last-child{border:none}.kh-suggest-item:hover{background:var(--g0)}.kh-suggest-item .kh-name{font-weight:600;color:var(--g6)}.kh-suggest-item .kh-code{font-family:var(--mono);font-size:10px;color:var(--g4)}
.kh-selected-chip{display:flex;align-items:center;gap:6px;height:26px;padding:0 8px 0 10px;background:var(--emr-lt);border:1px solid var(--emr-md);border-radius:13px;font-size:11px;font-weight:600;color:var(--emr);white-space:nowrap}
.kh-selected-chip .kh-chip-x{cursor:pointer;font-size:14px;opacity:.6}.kh-selected-chip .kh-chip-x:hover{opacity:1}

.bp-select{height:32px;padding:0 8px;background:var(--g0);border:1px solid var(--g2);border-radius:6px;font-family:var(--sans);font-size:12px;font-weight:600;color:var(--g6);outline:none;cursor:pointer;min-width:80px}.bp-select:focus{border-color:var(--blue-md)}
.bp-label{font-size:11px;font-weight:600;color:var(--g4);margin-right:2px}

/* TABLE */
.table-wrap{flex:1;overflow:auto;position:relative}
.empty-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--g4)}
table{width:max-content;min-width:100%;border-collapse:separate;border-spacing:0}
thead th{position:sticky;top:0;z-index:30;background:var(--white);border-bottom:2px solid var(--g2);padding:0;text-align:center;vertical-align:middle;font-size:12px;font-weight:800;color:var(--g5);white-space:nowrap;letter-spacing:.03em}
thead th:first-child{text-align:left}thead th:nth-child(2){text-align:left}
.th-main{padding:8px var(--pad);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase}
.th-date{font-family:var(--mono);font-size:10px;color:var(--g3);font-weight:500;padding:4px var(--pad);text-align:center;line-height:1.5}
/* Column color borders */
.col-cn{border-left:3px solid var(--blue);color:var(--blue)}
.col-ds{border-left:3px solid var(--emr);color:var(--emr)}
.col-dt{border-left:3px solid var(--purple);color:var(--purple)}
.col-dt-sub{border-left:3px solid var(--purple);color:var(--purple)}
.col-cn2{border-left:3px solid var(--amber);color:var(--amber)}
.col-dntk{border-left:3px solid #c0392b;color:#c0392b}
.col-dnck{border-left:3px solid #2c3e50;color:#2c3e50}
/* Column resize handle */
th{position:relative;overflow:visible}
th .col-resize{position:absolute;right:-3px;top:0;bottom:0;width:6px;cursor:col-resize;z-index:31}
th .col-resize:hover,th .col-resize.active{background:var(--blue-md);opacity:.4}
tbody tr{border-bottom:1px solid var(--g1);transition:background .07s}
tr.row-nv{background:#dbe4f5}tr.row-nv.lv0{background:#d2dcf2}tr.row-nv.lv1{background:#dee6f6}tr.row-nv.lv2{background:#e6ecf8}tr.row-nv.lv3{background:#ecf0fa}
tr.row-nv:hover{background:#cddaf3!important}tr.row-kh{background:var(--white)}tr.row-kh:hover{background:var(--g0)}
td{height:var(--row-h);padding:0 var(--pad);vertical-align:middle;white-space:nowrap;min-width:100px}
.cell-name{display:flex;align-items:center;height:100%}
.tree-lines{display:inline-flex;flex-shrink:0;height:var(--row-h)}.tree-seg{width:18px;height:var(--row-h);position:relative;flex-shrink:0}
.tree-seg.vline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:1px;background:var(--tree-line)}
.tree-seg.branch::before{content:'';position:absolute;left:8px;top:0;width:1px;height:50%;background:var(--tree-line)}.tree-seg.branch::after{content:'';position:absolute;left:8px;top:50%;width:9px;height:1px;background:var(--tree-line)}
.tree-seg.branch-cont::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:1px;background:var(--tree-line)}.tree-seg.branch-cont::after{content:'';position:absolute;left:8px;top:50%;width:9px;height:1px;background:var(--tree-line)}
.tog{width:18px;height:18px;margin-right:3px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;border:none;background:none;cursor:pointer;color:var(--g4)}.tog:hover{background:var(--g2)}.tog svg{width:9px;height:9px;stroke:currentColor;fill:none;stroke-linecap:round}
.tog-sp{width:20px;display:inline-block;flex-shrink:0}
.nametxt{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
tr.row-nv .nametxt{font-size:12.5px;font-weight:600}tr.row-nv.lv0 .nametxt{font-size:13px;font-weight:700}tr.row-kh .nametxt{font-size:12px;color:var(--g5)}
.code{font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:4px;background:var(--g1);color:var(--g4)}
.n{font-family:var(--mono);font-size:11.5px;display:block;text-align:right}.n.pos{color:var(--g7)}.n.neg{color:var(--red)}.n.zero{color:var(--g3)}.n.sub{font-weight:600;font-size:12px}
.dash{color:var(--g3);font-family:var(--mono);font-size:11px}
.sh{display:inline-block;height:10px;width:55px;border-radius:3px;background:linear-gradient(90deg,var(--g1)25%,var(--g2)50%,var(--g1)75%);background-size:200%;animation:shim 1.3s infinite}@keyframes shim{0%{background-position:200%}100%{background-position:-200%}}
tfoot tr{border-top:2px solid var(--g2)}tfoot td{height:38px;padding:0 var(--pad);background:var(--white);font-weight:600;position:sticky;bottom:0;z-index:20;box-shadow:0 -1px 0 var(--g2)}
.foot-lbl{font-size:11px;font-weight:700;color:var(--g5);text-transform:uppercase}.n.grand{font-size:12.5px;font-weight:700}
#toasts{position:fixed;bottom:16px;right:16px;display:flex;flex-direction:column;gap:6px;z-index:9999;pointer-events:none}
.toast{background:var(--white);border:1px solid var(--g2);border-radius:8px;padding:8px 12px;box-shadow:0 4px 16px rgba(0,0,0,.1);font-size:12px;display:flex;align-items:center;gap:6px;animation:si .2s ease;pointer-events:all;max-width:280px}
.toast .ti{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px}
.toast.ok .ti{background:var(--emr-lt);color:var(--emr)}.toast.err .ti{background:var(--red-lt);color:var(--red)}
@keyframes si{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--g2);border-radius:3px}

/* MOBILE BOTTOM TOOLBAR */
.mob-toolbar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:60;background:var(--white);border-top:1px solid var(--g2);box-shadow:0 -2px 12px rgba(0,0,0,.08);padding:6px 8px calc(6px + env(safe-area-inset-bottom));gap:4px;align-items:center;justify-content:space-around}
.mob-toolbar .mob-btn{display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;cursor:pointer;color:var(--g5);padding:4px 8px;border-radius:8px;font-family:var(--sans);font-size:9px;font-weight:600;min-width:48px;transition:all .1s}.mob-btn:active{background:var(--g1);transform:scale(.95)}.mob-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-linecap:round}.mob-btn.accent{color:var(--blue)}.mob-btn.green{color:var(--emr)}
.sheet-overlay{position:fixed;inset:0;background:rgba(15,22,35,.4);z-index:9980;opacity:0;pointer-events:none;transition:opacity .25s;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}.sheet-overlay.open{opacity:1;pointer-events:all}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;z-index:9985;background:var(--white);border-radius:16px 16px 0 0;box-shadow:0 -8px 40px rgba(0,0,0,.18);transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:85vh;display:flex;flex-direction:column;overflow:hidden}.bottom-sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--g3);margin:10px auto 6px;flex-shrink:0}
.sheet-title{font-size:14px;font-weight:700;padding:4px 16px 10px;border-bottom:1px solid var(--g1);flex-shrink:0}
.sheet-body{flex:1;overflow-y:auto;padding:12px 16px 20px;-webkit-overflow-scrolling:touch}
.sheet-section{margin-bottom:16px}.sheet-section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--g4);margin-bottom:8px}
.sheet-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.sheet-btn{display:flex;align-items:center;gap:8px;width:100%;height:44px;padding:0 12px;border:1px solid var(--g2);border-radius:8px;background:var(--white);font-family:var(--sans);font-size:13px;font-weight:600;color:var(--g6);cursor:pointer;transition:background .1s}.sheet-btn:hover,.sheet-btn:active{background:var(--g0)}.sheet-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-linecap:round;flex-shrink:0}.sheet-btn.green{color:var(--emr);border-color:var(--emr-md)}

/* ============================================================
   FIX #6: KH suggestion on mobile — use fixed positioning
   ============================================================ */
.kh-suggest-fixed{position:fixed!important;top:auto!important;bottom:60px;left:8px;right:8px;max-height:40vh;border-radius:12px;box-shadow:0 -4px 24px rgba(0,0,0,.15)}

/* ============================================================
   MOBILE PORTRAIT
   ============================================================ */
@media(max-width:768px){
  :root{--pad:8px;--row-h:36px;--topbar-h:48px}
  .topbar{padding:0 10px}.topbar-right>*:not(.status-chip){display:none!important}.topbar-right .v-div{display:none!important}.brand-sub{display:none}.brand-name{font-size:13px}
  .mob-toolbar{display:flex}
  .table-wrap{padding-bottom:60px}

  /* Sticky first column */
  thead th:first-child{position:sticky;left:0;z-index:38;background:var(--white);box-shadow:3px 0 8px rgba(0,0,0,.12);min-width:140px;max-width:200px;overflow:visible}
  tbody td:first-child,tfoot td:first-child{position:sticky;left:0;z-index:28;box-shadow:3px 0 8px rgba(0,0,0,.12);min-width:140px;max-width:200px;overflow:hidden;text-overflow:ellipsis}
  tfoot td:first-child{background:var(--white)}
  tr.row-nv td:first-child{background:inherit}
  tr.row-nv.lv0 td:first-child{background:#d2dcf2}
  tr.row-nv.lv1 td:first-child{background:#dee6f6}
  tr.row-nv.lv2 td:first-child{background:#e6ecf8}
  tr.row-nv.lv3 td:first-child{background:#ecf0fa}
  tr.row-nv:hover td:first-child{background:#cddaf3}
  tr.row-kh td:first-child{background:var(--white)}tr.row-kh:hover td:first-child{background:var(--g0)}

  /* FIX #3: Hide code column on mobile portrait */
  thead th:nth-child(2),
  tbody td:nth-child(2),
  tfoot td:nth-child(2){display:none}

  .tree-seg{width:12px}tr.row-nv .nametxt{font-size:11.5px}tr.row-kh .nametxt{font-size:11px}.n{font-size:10.5px}.n.sub{font-size:11px}.n.grand{font-size:11.5px}
  thead th{font-size:9px}.th-main{font-size:9px;padding:4px var(--pad)}.th-date{font-size:8px}

  /* Picker panel → bottom sheet */
  .picker-panel{width:100%!important;left:0!important;right:0!important;top:auto!important;bottom:0!important;border-radius:16px 16px 0 0;max-height:80vh}.picker-tree{max-height:55vh}.pi{height:40px}

  #toasts{bottom:70px;right:10px;left:10px}.toast{max-width:100%}
}

/* ============================================================
   FIX #1: PHONE LANDSCAPE — use hover:none + max-height
   instead of max-width to avoid affecting desktop narrow windows
   ============================================================ */
@media(orientation:landscape) and (max-height:500px) and (hover:none){
  :root{--topbar-h:32px;--row-h:26px;--pad:5px}

  /* FIX #2: Don't override header height here — let _header_css.html handle it
     Only override this page's topbar */
  .topbar{height:32px;padding:0 6px}
  .brand-mark{width:20px;height:20px;border-radius:4px}.brand-mark svg{width:10px;height:10px}
  .brand-name{font-size:11px}.brand-sub{display:none}
  .topbar-right>*:not(.status-chip){display:none!important}.topbar-right .v-div{display:none!important}

  /* Compact toolbar */
  .mob-toolbar{display:flex;padding:2px 4px calc(2px + env(safe-area-inset-bottom));height:auto}
  .mob-btn{padding:2px 3px;min-width:32px}.mob-btn svg{width:13px;height:13px}.mob-btn span{font-size:7px}
  .table-wrap{padding-bottom:36px}

  /* Compact table */
  thead th{font-size:8px;padding:2px var(--pad)}.th-main{padding:3px var(--pad);font-size:9px}.th-date{font-size:7px;padding:1px var(--pad)}
  .n{font-size:9.5px}.n.sub{font-size:10px}.n.grand{font-size:10.5px}
  tr.row-nv .nametxt{font-size:10px}tr.row-kh .nametxt{font-size:9.5px}
  .tree-seg{width:8px}.tog{width:14px;height:14px}.tog svg{width:7px;height:7px}.tog-sp{width:16px}
  .code{font-size:8px;padding:1px 4px}

  /* Sticky first column */
  thead th:first-child{position:sticky;left:0;top:0;z-index:38;background:var(--white);box-shadow:3px 0 6px rgba(0,0,0,.1);min-width:110px;max-width:160px;overflow:visible}
  tbody td:first-child,tfoot td:first-child{position:sticky;left:0;z-index:28;box-shadow:3px 0 6px rgba(0,0,0,.1);min-width:110px;max-width:160px;overflow:hidden;text-overflow:ellipsis}
  tfoot td:first-child{background:var(--white)}
  tr.row-nv td:first-child{background:inherit}
  tr.row-nv.lv0 td:first-child{background:#d2dcf2}tr.row-nv.lv1 td:first-child{background:#dee6f6}tr.row-nv.lv2 td:first-child{background:#e6ecf8}
  tr.row-kh td:first-child{background:var(--white)}

  /* Hide code column on landscape too */
  thead th:nth-child(2),
  tbody td:nth-child(2),
  tfoot td:nth-child(2){display:none}

  /* FIX #4: Picker → left side panel with overlay backdrop */
  .picker-panel{width:300px!important;left:0!important;right:auto!important;top:0!important;bottom:0!important;border-radius:0 10px 10px 0;max-height:100vh!important;box-shadow:4px 0 24px rgba(0,0,0,.18)}
  .picker-tree{max-height:calc(100vh - 120px)}
  .pi{height:34px}

  /* Bottom sheet shorter for landscape */
  .bottom-sheet{max-height:70vh;border-radius:12px 12px 0 0}
  .sheet-handle{margin:6px auto 4px}
  .sheet-title{font-size:13px;padding:3px 14px 8px}
  .sheet-body{padding:8px 14px 14px}

  /* Footer */
  tfoot td{height:28px}

  /* Toasts above toolbar */
  #toasts{bottom:42px;right:10px;left:auto}.toast{max-width:260px}
}

/* Very short landscape (e.g. iPhone SE landscape) */
@media(orientation:landscape) and (max-height:380px) and (hover:none){
  :root{--row-h:24px;--topbar-h:30px}
  .mob-btn span{display:none}
  .mob-btn{min-width:28px;padding:3px}
  .mob-btn svg{width:14px;height:14px}
  .mob-toolbar{padding:1px 4px calc(1px + env(safe-area-inset-bottom))}
  .table-wrap{padding-bottom:32px}
  thead th:first-child,tbody td:first-child,tfoot td:first-child{min-width:100px!important;max-width:140px}
}

@media(max-width:380px){thead th:first-child,tbody td:first-child,tfoot td:first-child{min-width:130px;max-width:160px}}
</style>

<div class="app">

  <div class="topbar-right">
    <!-- NV Picker -->
    <div class="picker-wrap" id="picker-wrap"><button class="picker-trigger" id="picker-trigger" onclick="togglePicker()"><svg class="ico-search" viewBox="0 0 16 16" stroke-width="1.8"><circle cx="6.5" cy="6.5" r="4"/><line x1="10" y1="10" x2="14" y2="14"/></svg><span id="picker-label">NV</span><span class="picker-badge all" id="picker-badge">—</span></button>
    </div>
    <!-- KH Search -->
    <div class="kh-search-wrap" id="kh-wrap"><svg viewBox="0 0 16 16" stroke-width="1.8"><circle cx="6.5" cy="6.5" r="4"/><line x1="10" y1="10" x2="14" y2="14"/></svg><input type="text" id="kh-q" placeholder="Tìm KH..." oninput="onKHInput(this.value)" autocomplete="off"/><button class="kh-clear" id="kh-clear" onclick="clearKH()" style="display:none">✕</button>
      <div class="kh-suggest" id="kh-suggest"></div>
    </div>
    <span id="kh-chip-area"></span>

    <select class="bp-select" id="sel-kbc" onchange="onKBCChange()" style="min-width:120px"><option>Đang tải...</option></select>

    <button class="tbtn" id="btn-exp" onclick="toggleExp()"><svg viewBox="0 0 16 16" stroke-width="2"><polyline points="4,10 8,6 12,10"/></svg>Thu</button>
    <button class="tbtn" onclick="loadAllData()"><svg viewBox="0 0 16 16" stroke-width="2"><path d="M2 8a6 6 0 1 1 1 3.5"/><polyline points="2,4 2,8 6,8"/></svg>Tải lại</button>
    <button class="tbtn green" onclick="exportExcel()"><svg viewBox="0 0 16 16" stroke-width="2"><path d="M8 2v8m0 0l-3-3m3 3l3-3"/><path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2"/></svg>Excel</button>
    <div class="v-div"></div>

</div>

<div class="picker-panel" id="picker-panel"><div class="picker-head"><div class="picker-search-row"><svg viewBox="0 0 16 16" stroke-width="1.8"><circle cx="6.5" cy="6.5" r="4"/><line x1="10" y1="10" x2="14" y2="14"/></svg><input type="text" id="picker-q" placeholder="Tìm NV..." oninput="renderPickerTree()"/></div><div class="picker-actions"><button class="picker-act-btn" onclick="pickerSelectAll()">Chọn tất cả</button><button class="picker-act-btn" onclick="pickerClearAll()">Bỏ chọn</button></div></div><div class="picker-tree" id="picker-tree"></div><div class="picker-foot"><button class="picker-close" onclick="closePicker()">Đóng</button><button class="picker-apply" onclick="applyPicker()">Áp dụng</button></div></div>

<!-- MOBILE TOOLBAR -->
<nav class="mob-toolbar">

  <button class="mob-btn" onclick="openSheet('filter')"><svg viewBox="0 0 20 20" stroke-width="1.8"><line x1="3" y1="5" x2="17" y2="5"/><line x1="5" y1="10" x2="15" y2="10"/><line x1="7" y1="15" x2="13" y2="15"/></svg><span>Lọc</span></button>
  <button class="mob-btn accent" onclick="openSheet('kbc')"><svg viewBox="0 0 20 20" stroke-width="1.8"><rect x="3" y="3" width="14" height="14" rx="2"/><line x1="3" y1="8" x2="17" y2="8"/><line x1="7" y1="3" x2="7" y2="8"/><line x1="13" y1="3" x2="13" y2="8"/></svg><span>Kỳ</span></button>
  <button class="mob-btn" onclick="openSheet('actions')"><svg viewBox="0 0 20 20" stroke-width="1.8"><circle cx="10" cy="4" r="1.5" fill="currentColor" stroke="none"/><circle cx="10" cy="10" r="1.5" fill="currentColor" stroke="none"/><circle cx="10" cy="16" r="1.5" fill="currentColor" stroke="none"/></svg><span>Khác</span></button>

{% include "baocao_khachhang/_hist_modal.html" %}
{% include "_header_js.html" %}
<script>
const API_BASE='/reports/bao-cao-khach-hang';
const FMT=new Intl.NumberFormat('vi-VN',{maximumFractionDigits:0});
const fmtV=v=>FMT.format(Math.round(v));
const fmtD=s=>{if(!s)return'';s=s.substring(0,10);const p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0]};
const iso=d=>d?String(d).substring(0,10):'';
function numH(v,c,inv){if(v==null)return'<span class="dash">—</span>';const n=Math.round(v);var s;if(inv){s=n>0?'neg':n<0?'pos':'zero'}else{s=n<0?'neg':n===0?'zero':'pos'}return'<span class="n '+s+' '+(c||'')+'">'+ fmtV(v)+'</span>'}
const shimH=()=>'<span class="sh"></span>';
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}
function setS(st,t){document.getElementById('sDot').className='s-dot '+st;document.getElementById('sTxt').textContent=t}
function toast(m,t){t=t||'ok';const e=document.createElement('div');e.className='toast '+t;e.innerHTML='<div class="ti">'+(t==='ok'?'✓':'✕')+'</div><span>'+m+'</span>';document.getElementById('toasts').appendChild(e);setTimeout(()=>e.remove(),3500)}

/* FIX #1: Better isMobile detection — includes landscape phone */
function isMobile(){return window.innerWidth<=768||(window.matchMedia&&window.matchMedia('(orientation:landscape) and (max-height:500px) and (hover:none)').matches)}
function isLandscapePhone(){return window.matchMedia&&window.matchMedia('(orientation:landscape) and (max-height:500px) and (hover:none)').matches}

// Permission from server
const USER_NVKD='{{ user_ma_nvkd }}';
const USER_BP='{{ user_ma_bp }}';
const userNvkdList=USER_NVKD?USER_NVKD.split(',').map(s=>s.trim()).filter(Boolean):[];
const userBpList=USER_BP?USER_BP.split(',').map(s=>s.trim()).filter(Boolean):[];

// State
let hierarchy=[],nvMap={},khMap={},khNames={},expState={},allExp=true;
let selectedNV=null,pendingNV=new Set(),pickerExp={},pickerOpen=false;
let selectedBP='',selectedKH=null;
let kbcList=[],currentKBC=null;
let lastRenderedRows=[],lastDispCols=[];
let ttSplit=false;
let colData={du_no_dk:{},ban_ra:{},tt1:{},tt2:{},du_no_tk:{},du_no_ct:{},du_no_ck:{}};
let colLoading={du_no_dk:false,ban_ra:false,tt1:false,tt2:false,du_no_tk:false,du_no_ct:false,du_no_ck:false};
let colLoaded={du_no_dk:false,ban_ra:false,tt1:false,tt2:false,du_no_tk:false,du_no_ct:false,du_no_ck:false};
function getCOLS(){return ttSplit?['du_no_dk','ban_ra','tt1','tt2','du_no_tk','du_no_ct','du_no_ck']:['du_no_dk','ban_ra','tt_merged','du_no_tk','du_no_ct','du_no_ck']}
const COLS=['du_no_dk','ban_ra','tt1','tt2','du_no_tk','du_no_ct','du_no_ck'];
const BP_NHOM_A=['VA','VB','SF']; // có lân kì: thanh toán theo khoảng thu tiền
function isBPNhomA(bp){return !bp || BP_NHOM_A.includes(bp)}
function isBPNhomB(bp){return bp && !BP_NHOM_A.includes(bp)}

let allowedNV=new Set();
function computeAllowedNV(){
    if(!userNvkdList.length){allowedNV=new Set(hierarchy.map(h=>h.ma_nvkd));return}
    allowedNV=new Set();
    function addDescendants(id){allowedNV.add(id);(nvMap[id]?nvMap[id].children:[]).forEach(c=>addDescendants(c.ma_nvkd))}
    userNvkdList.forEach(id=>{if(nvMap[id])addDescendants(id)});
}
function getAllowedBP(){
    if(!userBpList.length){const s=new Set();Object.values(khMap).forEach(v=>{if(v.ma_bp)s.add(v.ma_bp)});return[...s].sort()}
    return userBpList.sort();
}

async function init(){
      setS('busy','Tải...');showLoading('Đang tải dữ liệu…');
      try{
        const [rH,rK,rKBC]=await Promise.all([
            fetch(API_BASE+'/api/hierarchy').then(r=>r.json()),
            fetch(API_BASE+'/api/khachhang').then(r=>r.json()),
            fetch(API_BASE+'/api/ky-bao-cao').then(r=>r.json())
        ]);
        if(!rH.success)throw new Error(rH.error);
        hierarchy=rH.data;nvMap={};
        hierarchy.forEach(h=>{nvMap[h.ma_nvkd]={...h,children:[],_vals:{}};if(!(h.ma_nvkd in expState))expState[h.ma_nvkd]=true});
        hierarchy.forEach(h=>{if(h.ma_ql&&nvMap[h.ma_ql])nvMap[h.ma_ql].children.push(nvMap[h.ma_nvkd])});
        khMap={};khNames={};
        if(rK.success)rK.data.forEach(k=>{if(k.ma_kh){khMap[k.ma_kh]={ma_nvkd:k.ma_nvkd,ten_kh:k.ten_kh,ma_bp:k.ma_bp||''};khNames[k.ma_kh]=k.ten_kh}});
        computeAllowedNV();
        const bps=getAllowedBP();
        const bpSel=document.getElementById('bp-select');
        bpSel.innerHTML=(bps.length>1?'<option value="">Tất cả BP</option>':'')+bps.map(b=>'<option value="'+esc(b)+'">'+esc(b)+'</option>').join('');
        if(bps.length===1){selectedBP=bps[0];bpSel.value=bps[0]}
        hierarchy.forEach(h=>{pickerExp[h.ma_nvkd]=(h.level===0)});
        kbcList=rKBC.success?rKBC.data:[];populateKBC();
        setS('ok',hierarchy.length+' NV');
        toast(allowedNV.size+' NV, '+Object.keys(khMap).length+' KH');
        updatePickerBadge();
        if(currentKBC)loadAllData();
            else{hideLoading();document.getElementById('empty').style.display='flex';document.getElementById('emptyMsg').textContent='Chưa có kỳ báo cáo phù hợp';}
    }catch(e){hideLoading();setS('err','Lỗi');document.getElementById('emptyMsg').textContent='⚠ '+e.message;toast(e.message,'err')}
}

function populateKBC(){
    const sel=document.getElementById('sel-kbc');
    const today=new Date().toISOString().substring(0,10);
    let defId=null;
    kbcList.forEach(k=>{if(k.loai_kbc==='Tháng'){const bd=iso(k.ngay_bd_thu_tien),kt=iso(k.ngay_kt_thu_tien);if(bd&&kt&&today>=bd&&today<=kt&&!defId)defId=k.id}});
    if(!defId&&kbcList.length)defId=kbcList[0].id;
    sel.innerHTML=kbcList.map(k=>'<option value="'+k.id+'"'+(k.id===defId?' selected':'')+'>'+esc(k.ten_kbc)+' ('+k.loai_kbc+')</option>').join('');
    currentKBC=defId?kbcList.find(k=>k.id===defId):null;
}
function onKBCChange(){currentKBC=kbcList.find(k=>k.id===parseInt(document.getElementById('sel-kbc').value))||null;if(currentKBC)loadAllData()}
function onBPChange(v){selectedBP=v;if(currentKBC)loadAllData()}

// KH search with suggestions
function onKHInput(v){
    v=v.trim();
    if(v.length<2){document.getElementById('kh-suggest').classList.remove('show');return}
    const q=v.toLowerCase();
    const matches=Object.entries(khMap).filter(([mk,info])=>{
        if(selectedBP&&info.ma_bp!==selectedBP)return false;
        if(userBpList.length&&!userBpList.includes(info.ma_bp))return false;
        return(info.ten_kh||'').toLowerCase().includes(q)||mk.toLowerCase().includes(q);
    }).slice(0,8);
    const sg=document.getElementById('kh-suggest');
    if(!matches.length){sg.classList.remove('show');return}
    sg.innerHTML=matches.map(([mk,info])=>'<div class="kh-suggest-item" onclick="selectKH(\''+esc(mk)+'\',\''+esc(info.ten_kh||mk)+'\')"><span class="kh-name">'+esc(info.ten_kh||mk)+'</span><span class="kh-code">'+esc(mk)+'</span></div>').join('');
    /* FIX #6: On mobile, use fixed positioning for suggestions */
    if(isMobile()){sg.classList.add('kh-suggest-fixed')}else{sg.classList.remove('kh-suggest-fixed')}
    sg.classList.add('show');
}
function selectKH(mk,name){
    selectedKH={ma_kh:mk,ten_kh:name};
    document.getElementById('kh-q').value='';
    document.getElementById('kh-suggest').classList.remove('show');
    document.getElementById('kh-clear').style.display='none';
    document.getElementById('kh-chip-area').innerHTML='<span class="kh-selected-chip">'+esc(name)+' <span class="kh-chip-x" onclick="clearKH()">✕</span></span>';
    if(currentKBC)loadAllData();
}
function clearKH(){selectedKH=null;document.getElementById('kh-chip-area').innerHTML='';document.getElementById('kh-q').value='';if(currentKBC)loadAllData()}
document.addEventListener('click',e=>{if(!document.getElementById('kh-wrap').contains(e.target))document.getElementById('kh-suggest').classList.remove('show')});

// Fetch helper
async function fetchPost(url,body){const r=await fetch(API_BASE+url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return r.json()}
function parseCN(j){const m={};if(j.success)j.data.forEach(r=>{const nv=r.ma_nvkd||'_UNK';if(!m[nv])m[nv]={};m[nv][r.ma_kh]=(m[nv][r.ma_kh]||0)+(r.du_no_ck||0);if(r.ten_kh)khNames[r.ma_kh]=r.ten_kh});return m}
function parseDS(j){const m={};if(j.success)j.data.forEach(r=>{const nv=r.ma_nvkd||'_UNK';if(!m[nv])m[nv]={};m[nv][r.ma_kh]=(m[nv][r.ma_kh]||0)+(r.tong_doanhso||0)});return m}
function parseDT(j){const m={};if(j.success)j.data.forEach(r=>{const nv=r.ma_nvkd||'_UNK';if(!m[nv])m[nv]={};m[nv][r.ma_kh]=(m[nv][r.ma_kh]||0)+(r.doanhthu||0)});return m}
function parseDNTK(j){const m={};if(j.success)j.data.forEach(r=>{const nv=r.ma_nvkd||'_UNK';if(!m[nv])m[nv]={};m[nv][r.ma_kh]=(m[nv][r.ma_kh]||0)+(r.du_no_trong_ky||0);if(r.ten_kh)khNames[r.ma_kh]=r.ten_kh});return m}
function parseDNCK(j){const m={};if(j.success)j.data.forEach(r=>{const nv=r.ma_nvkd||'_UNK';if(!m[nv])m[nv]={};m[nv][r.ma_kh]=(m[nv][r.ma_kh]||0)+(r.du_no_cuoi_ky||0);if(r.ten_kh)khNames[r.ma_kh]=r.ten_kh});return m}

async function loadAllData(){
    if(!currentKBC)return;
    const k=currentKBC;
    COLS.forEach(c=>{colData[c]={};colLoaded[c]=false;colLoading[c]=true});
    document.getElementById('tbl').style.display='';document.getElementById('empty').style.display='none';
    renderAll();setS('busy','Tải...');showLoading('Đang tải dữ liệu…');
    const bp=selectedBP||(userBpList.length?userBpList.join(','):'');
    const nv=allowedNV.size>0&&userNvkdList.length?[...allowedNV].join(','):'';
    const kh=selectedKH?selectedKH.ma_kh:'';
    const dDNDK=iso(k.ngay_du_no_dau_ki),dBDXB=iso(k.ngay_bd_xuat_ban),dKTXB=iso(k.ngay_kt_xuat_ban);
    const dBDTT=iso(k.ngay_bd_thu_tien),dKTTT=iso(k.ngay_kt_thu_tien),dBDLK=iso(k.ngay_bd_lan_ki),dKTLK=iso(k.ngay_kt_lan_ki),dDNCK=iso(k.ngay_du_no_cuoi_ki);
    let ngayTruocLK='';
    if(dBDLK){const d=new Date(dBDLK);d.setDate(d.getDate()-1);ngayTruocLK=d.toISOString().substring(0,10)}
    if(!dDNDK||!dBDXB||!dKTXB||!dBDTT||!dKTTT||!dDNCK){hideLoading();setS('err','Thiếu ngày');toast('Kỳ thiếu ngày','err');COLS.forEach(c=>colLoading[c]=false);renderAll();return}
    try{
        const [r1,r2,r3,r4,r5,r6,r7]=await Promise.all([
            fetchPost('/api/congno',{ngay_cut:dDNDK,ma_bp:bp,ds_nvkd:nv,ds_kh:kh}),
            fetchPost('/api/doanhso',{ngay_a:dBDXB,ngay_b:dKTXB,ma_bp:bp,ds_nvkd:nv,ds_kh:kh}),
            (dBDTT&&ngayTruocLK)?fetchPost('/api/doanhthu',{ngay_a:dBDTT,ngay_b:ngayTruocLK,ngay_a2:dBDXB,ngay_b2:dKTXB,ma_bp:bp,ds_nvkd:nv,ds_kh:kh}):Promise.resolve({success:true,data:[]}),
            (dBDLK&&dKTTT)?fetchPost('/api/doanhthu',{ngay_a:dBDLK,ngay_b:dKTTT,ma_bp:bp,ds_nvkd:nv,ds_kh:kh}):Promise.resolve({success:true,data:[]}),
            fetchPost('/api/dunotrongky',{ngay_a_hang:dBDXB,ngay_b_hang:dKTXB,ngay_a_tien:dBDTT,ngay_b_tien:dKTTT,ma_bp:bp,ds_nvkd:nv,ds_kh:kh}),
            fetchPost('/api/congno',{ngay_cut:dDNCK,ma_bp:bp,ds_nvkd:nv,ds_kh:kh}),
            fetchPost('/api/dunocuoiky',{ngay_cut:dKTTT,ngay_a_lk:dBDLK,ngay_b_lk:dKTLK,ma_bp:bp,ds_nvkd:nv,ds_kh:kh}),
        ]);
        colData.du_no_dk=parseCN(r1);colData.ban_ra=parseDS(r2);colData.tt1=parseDT(r3);colData.tt2=parseDT(r4);colData.du_no_tk=parseDNTK(r5);colData.du_no_ct=parseCN(r6);colData.du_no_ck=parseDNCK(r7);
                // Nhóm B: xóa khỏi tt2 (thanh toán ngay, không có lân kì → tt2 = 0)
Object.keys(colData.tt2).forEach(function(nv){
    Object.keys(colData.tt2[nv]).forEach(function(kh){
        var bpKH=khMap[kh]?khMap[kh].ma_bp:'';
        if(bpKH && !BP_NHOM_A.includes(bpKH)) delete colData.tt2[nv][kh];
    });
});
        COLS.forEach(c=>{colLoaded[c]=true;colLoading[c]=false});
        hideLoading();setS('ok','OK');renderAll();toast('Đã tải xong');
    }catch(e){hideLoading();setS('err','Lỗi');toast(e.message,'err');COLS.forEach(c=>colLoading[c]=false);renderAll()}
}

function aggregate(){
    Object.values(nvMap).forEach(n=>{n._vals={}});
    COLS.forEach(cid=>{
        if(!colLoaded[cid])return;
        Object.values(nvMap).forEach(n=>{n._vals[cid]={kh:{},total:null}});
        Object.keys(colData[cid]).forEach(nvkd=>{const nd=nvMap[nvkd];if(!nd)return;Object.entries(colData[cid][nvkd]).forEach(([mk,v])=>{nd._vals[cid].kh[mk]=(nd._vals[cid].kh[mk]||0)+v})});
        [...hierarchy].sort((a,b)=>b.level-a.level).forEach(h=>{
            const nd=nvMap[h.ma_nvkd],cv=nd._vals[cid];
            const sel=selectedNV===null||selectedNV.has(h.ma_nvkd);
            let sum=0,has=false;
            if(sel)Object.values(cv.kh).forEach(v=>{sum+=v;has=true});
            nd.children.forEach(c=>{const ct=c._vals[cid]?c._vals[cid].total:null;if(ct!=null){sum+=ct;has=true}});
            cv.total=has?sum:null;
        });
    });
}

function getKHName(mk){return khNames[mk]||(khMap[mk]&&khMap[mk].ten_kh)||mk}
function treeH(anc,isL,dep){if(dep===0)return'';let h='';for(let i=0;i<anc.length;i++)h+=anc[i].cont?'<span class="tree-seg vline"></span>':'<span class="tree-seg"></span>';h+=isL?'<span class="tree-seg branch"></span>':'<span class="tree-seg branch-cont"></span>';return h}

function buildRows(){
    const isF=selectedNV!==null;
    const rows=[];
    function getKH(nd){const s=new Set();COLS.forEach(c=>{if(colLoaded[c]&&nd._vals[c])Object.keys(nd._vals[c].kh).forEach(k=>s.add(k))});return[...s]}
    function fKH(keys){return keys.filter(k=>{if(selectedKH&&k!==selectedKH.ma_kh)return false;return true})}
    function hasData(nd){
        if(!allowedNV.has(nd.ma_nvkd))return false;
        for(const c of COLS){if(!colLoaded[c])continue;const cv=nd._vals[c];if(cv&&cv.total!=null&&cv.total!==0)return true}
        return nd.children.some(c=>hasData(c));
    }
    let treeRoots;
    if(userNvkdList.length){treeRoots=userNvkdList.filter(id=>nvMap[id]).map(id=>nvMap[id]).sort((a,b)=>a.stt_nhom.localeCompare(b.stt_nhom))}
    else{treeRoots=hierarchy.filter(h=>!h.ma_ql||!nvMap[h.ma_ql]).map(h=>nvMap[h.ma_nvkd]).sort((a,b)=>a.stt_nhom.localeCompare(b.stt_nhom))}
    if(isF){
        const list=hierarchy.filter(h=>selectedNV.has(h.ma_nvkd)&&allowedNV.has(h.ma_nvkd)&&hasData(nvMap[h.ma_nvkd])).sort((a,b)=>a.stt_nhom.localeCompare(b.stt_nhom));
        list.forEach((h,i)=>{
            const nd=nvMap[h.ma_nvkd],exp=expState[nd.ma_nvkd]!==false;
            const fk=fKH(getKH(nd));
            rows.push({type:'nv',node:nd,expanded:exp,hasKids:fk.length>0,depth:0,ancestors:[],isLast:i===list.length-1});
            if(exp&&fk.length)fk.forEach((k,ki)=>{rows.push({type:'kh',ma_kh:k,ten_kh:getKHName(k),parentNV:nd,depth:1,ancestors:[{cont:ki<fk.length-1}],isLast:ki===fk.length-1})});
        });
    } else {
        function walk(nd,anc,isL,depthOffset){
            if(!hasData(nd))return;
            const relDepth=nd.level-depthOffset;
            const exp=expState[nd.ma_nvkd]!==false;
            const fk=fKH(getKH(nd));
            const vc=[...nd.children].sort((a,b)=>a.stt_nhom.localeCompare(b.stt_nhom)).filter(c=>hasData(c));
            rows.push({type:'nv',node:nd,expanded:exp,hasKids:vc.length>0||fk.length>0,depth:relDepth,ancestors:[...anc],isLast:isL});
            if(exp){
                const tot=fk.length+vc.length;let si=0;
                fk.forEach(k=>{const il=si===tot-1;rows.push({type:'kh',ma_kh:k,ten_kh:getKHName(k),parentNV:nd,depth:relDepth+1,ancestors:[...anc,{cont:!il}],isLast:il});si++});
                vc.forEach(child=>{const il=si===tot-1;walk(child,[...anc,{cont:!il}],il,depthOffset);si++});
            }
        }
        const visRoots=treeRoots.filter(r=>hasData(r));
        const baseLevel=visRoots.length?visRoots[0].level:0;
        visRoots.forEach((r,ri,arr)=>walk(r,[],ri===arr.length-1,baseLevel));
    }
    return rows;
}

function renderPickerTree(){
    const q=(document.getElementById('picker-q')?document.getElementById('picker-q').value:'').toLowerCase().trim();
    const roots=hierarchy.filter(h=>(!h.ma_ql||!nvMap[h.ma_ql])&&allowedNV.has(h.ma_nvkd)).map(h=>nvMap[h.ma_nvkd]).sort((a,b)=>a.stt_nhom.localeCompare(b.stt_nhom));

    function match(nd){if(!allowedNV.has(nd.ma_nvkd))return false;if(!q)return true;if((nd.ten_nvkd+' '+nd.ma_nvkd).toLowerCase().includes(q))return true;return nd.children.some(c=>match(c))}
    function hl(t){if(!q)return esc(t);const i=t.toLowerCase().indexOf(q);if(i<0)return esc(t);return esc(t.slice(0,i))+'<em>'+esc(t.slice(i,i+q.length))+'</em>'+esc(t.slice(i+q.length))}
    function wp(nd,d){
        if(!match(nd))return;const s=getCheckState(nd.ma_nvkd),hk=nd.children.filter(c=>allowedNV.has(c.ma_nvkd)).length>0,ind=d*18,isE=pickerExp[nd.ma_nvkd]!==false;

        if(hk&&(isE||q))nd.children.filter(c=>allowedNV.has(c.ma_nvkd)).sort((a,b)=>a.stt_nhom.localeCompare(b.stt_nhom)).forEach(c=>wp(c,d+1));
    }

        body='<div style="display:flex;flex-direction:column;gap:8px"><div class="sheet-btn" onclick="toggleExp();closeSheet()"><svg viewBox="0 0 20 20" stroke-width="1.8"><polyline points="5,8 10,13 15,8"/></svg>'+(allExp?'Thu gọn':'Mở rộng')+'</div><div class="sheet-btn" onclick="loadAllData();closeSheet()"><svg viewBox="0 0 20 20" stroke-width="1.8"><path d="M3 10a7 7 0 1 1 1.2 4"/><polyline points="3,6 3,10 7,10"/></svg>Tải lại</div><div class="sheet-btn green" onclick="exportExcel();closeSheet()"><svg viewBox="0 0 20 20" stroke-width="1.8"><path d="M10 3v10m0 0l-4-4m4 4l4-4"/><path d="M3 14v2a1.5 1.5 0 001.5 1.5h11A1.5 1.5 0 0017 16v-2"/></svg>Xuất file Excel</div></div>';
    }
    document.getElementById('sheet-title').textContent=title;document.getElementById('sheet-body').innerHTML=body;
    document.getElementById('sheet-overlay').classList.add('open');document.getElementById('bottom-sheet').classList.add('open');
    if(type==='filter'){const ms=document.getElementById('mob-bp-sel');if(ms){ms.innerHTML=document.getElementById('bp-select').innerHTML;ms.value=selectedBP}}
}
function closeSheet(){document.getElementById('sheet-overlay').classList.remove('open');document.getElementById('bottom-sheet').classList.remove('open')}

/* FIX #5: Swipe-down to dismiss bottom sheet */
(function(){
    var sheet=null,startY=0,currentY=0,isDragging=false;
    document.addEventListener('DOMContentLoaded',function(){
        sheet=document.getElementById('bottom-sheet');
        if(!sheet)return;
        var handle=sheet.querySelector('.sheet-handle');
        var titleEl=sheet.querySelector('.sheet-title');
        [handle,titleEl].forEach(function(el){
            if(!el)return;
            el.addEventListener('touchstart',function(e){
                startY=e.touches[0].clientY;currentY=startY;isDragging=true;
                sheet.style.transition='none';
            },{passive:true});
        });
        document.addEventListener('touchmove',function(e){
            if(!isDragging)return;
            currentY=e.touches[0].clientY;
            var dy=Math.max(0,currentY-startY);
            sheet.style.transform='translateY('+dy+'px)';
        },{passive:true});
        document.addEventListener('touchend',function(){
            if(!isDragging)return;
            isDragging=false;
            sheet.style.transition='';
            var dy=currentY-startY;
            if(dy>80) closeSheet();
            else sheet.style.transform='';
        });
    });
})();

// Column resize
function startResize(e,handle){e.preventDefault();e.stopPropagation();var th=handle.parentElement;var sx=e.clientX,sw=th.offsetWidth;handle.classList.add('active');function onM(ev){var nw=Math.max(80,sw+(ev.clientX-sx))+'px';th.style.width=nw;th.style.minWidth=nw;th.style.maxWidth=nw}function onU(){handle.classList.remove('active');document.removeEventListener('mousemove',onM);document.removeEventListener('mouseup',onU)}document.addEventListener('mousemove',onM);document.addEventListener('mouseup',onU)}
function startResizeTouch(e,handle){e.stopPropagation();var th=handle.parentElement;var sx=e.touches[0].clientX,sw=th.offsetWidth;handle.classList.add('active');function onM(ev){ev.preventDefault();var nw=Math.max(80,sw+(ev.touches[0].clientX-sx))+'px';th.style.width=nw;th.style.minWidth=nw;th.style.maxWidth=nw}function onU(){handle.classList.remove('active');document.removeEventListener('touchmove',onM);document.removeEventListener('touchend',onU)}document.addEventListener('touchmove',onM,{passive:false});document.addEventListener('touchend',onU)}

// Export Excel
async function exportExcel(){
    if(!lastRenderedRows.length||!currentKBC){toast('Chưa có dữ liệu','err');return}
    setS('busy','Xuất Excel…');showLoading('Đang xuất Excel…');
    const k=currentKBC;
    let ngayTruocLK='';
    if(iso(k.ngay_bd_lan_ki)){const d=new Date(iso(k.ngay_bd_lan_ki));d.setDate(d.getDate()-1);ngayTruocLK=d.toISOString().substring(0,10)}
    let ngayDNDKPlus1='';
    if(iso(k.ngay_du_no_dau_ki)){const d=new Date(iso(k.ngay_du_no_dau_ki));d.setDate(d.getDate()+1);ngayDNDKPlus1=d.toISOString().substring(0,10)}
    const colHeaderMap={
        du_no_dk:'DƯ NỢ ĐẦU THÁNG\nADMIN chốt số '+fmtD(ngayDNDKPlus1),
        ban_ra:'BÁN RA\n'+fmtD(iso(k.ngay_bd_xuat_ban))+' → '+fmtD(iso(k.ngay_kt_xuat_ban)),
        tt1:'THANH TOÁN\n'+fmtD(iso(k.ngay_bd_thu_tien))+' → '+fmtD(ngayTruocLK),
        tt2:'THANH TOÁN\n'+fmtD(iso(k.ngay_bd_lan_ki))+' → '+fmtD(iso(k.ngay_kt_thu_tien)),
        tt_merged:'THANH TOÁN\n'+fmtD(iso(k.ngay_bd_thu_tien))+' → '+fmtD(iso(k.ngay_kt_thu_tien)),
        du_no_tk:'DƯ NỢ CẦN THU\nTRONG KỲ',
        du_no_ct:'DƯ NỢ CUỐI THÁNG\nADMIN chốt số '+fmtD(iso(k.ngay_du_no_cuoi_ki)),
        du_no_ck:'DƯ NỢ CUỐI KỲ\nSau TT tới '+fmtD(iso(k.ngay_kt_thu_tien)),
    };
    const colHeaders=lastDispCols.map(c=>colHeaderMap[c]||c);
    function getCellNV(nd,c){
        if(c==='tt_merged'){const v1=(nd._vals.tt1?nd._vals.tt1.total:null),v2=(nd._vals.tt2?nd._vals.tt2.total:null);if(v1==null&&v2==null)return null;return(v1||0)+(v2||0)}
        const cv=nd._vals[c];return cv?cv.total:null;
    }
    function getCellKH(pNV,mk,c){
        if(c==='tt_merged'){const v1=(pNV._vals.tt1&&pNV._vals.tt1.kh[mk])!=null?pNV._vals.tt1.kh[mk]:null;const v2=(pNV._vals.tt2&&pNV._vals.tt2.kh[mk])!=null?pNV._vals.tt2.kh[mk]:null;if(v1==null&&v2==null)return null;return(v1||0)+(v2||0)}
        return(pNV._vals[c]&&pNV._vals[c].kh[mk])!=null?pNV._vals[c].kh[mk]:null;
    }
    const payload=[];
    lastRenderedRows.forEach(function(row){
        if(row.type==='nv'){const nd=row.node;const vals=lastDispCols.map(c=>getCellNV(nd,c));payload.push({type:'nv',depth:row.depth,name:nd.ten_nvkd||nd.ma_nvkd,values:vals})}
        else{const vals=lastDispCols.map(c=>getCellKH(row.parentNV,row.ma_kh,c));payload.push({type:'kh',depth:0,name:row.ten_kh,values:vals})}
    });
    let footRoots;
    if(userNvkdList.length){footRoots=userNvkdList.filter(id=>nvMap[id]).map(id=>nvMap[id])}
    else{footRoots=hierarchy.filter(h=>!h.ma_ql||!nvMap[h.ma_ql]).map(h=>nvMap[h.ma_nvkd])}
    const totVals=lastDispCols.map(c=>{let sum=0,has=false;footRoots.forEach(r=>{const t=getCellNV(r,c);if(t!=null){sum+=t;has=true}});return has?sum:null});
    payload.push({type:'total',depth:0,name:'TỔNG CỘNG',values:totVals});
    try{
        const resp=await fetch(API_BASE+'/api/export_excel',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rows:payload,col_headers:colHeaders,kbc_name:k.ten_kbc||''})});
        if(!resp.ok)throw new Error('Server error '+resp.status);
        const blob=await resp.blob();const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;
        const cd=resp.headers.get('Content-Disposition');let fn='BaoCaoKH.xlsx';if(cd){const m=cd.match(/filename=(.+)/);if(m)fn=m[1].replace(/"/g,'')}
        a.download=fn;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
        hideLoading();setS('ok','OK');toast('Đã tải Excel');
    }catch(e){hideLoading();setS('err','Lỗi');toast(e.message,'err')}
}

/* ============================================================
   HYBRID SCROLL — trick mobile browser into hiding address bar
   
   Problem: overflow:hidden on body prevents browser from auto-hiding
   address bar on scroll, because body never scrolls.
   
   Solution: On mobile, unlock body overflow and add a tiny spacer
   element so the page is 1px taller than viewport. When user touches
   the table, we do a one-time window.scrollTo(0,1) which triggers
   the browser to hide the address bar. All table functionality
   (sticky thead/tfoot/first-col, horizontal scroll) stays inside
   .table-wrap's own scroll context — unchanged.
   ============================================================ */
let hybridActive=false;
let spacerEl=null;
function activateHybridScroll(){
    const app=document.querySelector('.app');
    if(!app)return;
    const isTouch=window.matchMedia('(hover:none)').matches;
    const isNarrow=window.innerWidth<=768;
    const isLandscape=window.matchMedia('(orientation:landscape) and (max-height:500px) and (hover:none)').matches;

    if(isTouch&&(isNarrow||isLandscape)){
        if(hybridActive)return;
        hybridActive=true;
        // Unlock body scroll
        document.documentElement.style.overflow='auto';
        document.body.style.overflow='auto';
        document.documentElement.style.height='auto';
        document.body.style.height='auto';
        app.classList.add('hybrid-scroll');
        // Add spacer to make page 1px taller than viewport
        if(!spacerEl){
            spacerEl=document.createElement('div');
            spacerEl.className='hybrid-spacer';
            document.body.appendChild(spacerEl);
        }
        // On first touch inside table-wrap, scroll body by 1px to trigger address bar hide
        const tw=document.querySelector('.table-wrap');
        if(tw&&!tw._hybridBound){
            tw._hybridBound=true;
            tw.addEventListener('touchstart',function(){
                if(window.scrollY<1)window.scrollTo(0,1);
            },{passive:true,once:false});
        }
    } else {
        if(!hybridActive)return;
        hybridActive=false;
        document.documentElement.style.overflow='hidden';
        document.body.style.overflow='hidden';
        document.documentElement.style.height='100%';
        document.body.style.height='100%';
        app.classList.remove('hybrid-scroll');
        if(spacerEl){spacerEl.remove();spacerEl=null}
        window.scrollTo(0,0);
    }
}
window.addEventListener('resize',activateHybridScroll);
window.addEventListener('orientationchange',function(){setTimeout(activateHybridScroll,200)});

document.addEventListener('DOMContentLoaded',function(){
    activateHybridScroll();
    init();
});
</script>
