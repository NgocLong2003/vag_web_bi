<!-- ══ TAB: LOG ══ -->
<div class="tab-content" id="tab-log">
<style>
.log-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.log-toolbar input,.log-toolbar select{height:34px;padding:0 10px;border:1.5px solid var(--g2);border-radius:6px;font-size:12px;outline:none;background:var(--white);font-family:var(--sans)}
.log-toolbar input:focus,.log-toolbar select:focus{border-color:var(--blue)}
.log-wrap{overflow-x:auto;background:var(--white);border:1px solid var(--g2);border-radius:8px}
table.log-tbl{width:100%;border-collapse:collapse;font-size:12px}
.log-tbl thead th{position:sticky;top:0;background:var(--g1);padding:8px 10px;text-align:left;font-size:10px;font-weight:800;color:var(--g4);text-transform:uppercase;border-bottom:2px solid var(--g2);white-space:nowrap}
.log-tbl tbody tr{border-bottom:1px solid var(--g2)}.log-tbl tbody tr:hover{background:var(--blue-lt)}
.log-tbl td{padding:6px 10px;vertical-align:top;white-space:nowrap}
.log-tbl td.changes-cell{white-space:normal;max-width:400px;font-size:11px}
.log-action{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.log-action.create{background:var(--green-lt);color:var(--green)}
.log-action.edit{background:var(--blue-lt);color:var(--blue)}
.log-action.delete{background:var(--red-lt);color:var(--red)}
.log-action.perm_change{background:var(--purple-lt);color:var(--purple)}
.log-action.bp_change{background:var(--amber-lt);color:var(--amber)}
.chg-field{font-weight:700;color:var(--g5)}.chg-old{color:var(--red);text-decoration:line-through}.chg-new{color:var(--green)}
.log-empty{padding:40px;text-align:center;color:var(--g4);font-size:13px}
</style>
<div class="log-toolbar">
  <input type="text" id="logSearch" placeholder="Tìm user, admin..." style="width:240px" oninput="loadAuditLog()">
  <select id="logAction" onchange="loadAuditLog()"><option value="">Tất cả hành động</option><option value="create">Tạo mới</option><option value="edit">Chỉnh sửa</option><option value="delete">Xóa</option><option value="perm_change">Phân quyền</option><option value="bp_change">Đổi BP</option></select>
  <select id="logDays" onchange="loadAuditLog()"><option value="7">7 ngày</option><option value="30" selected>30 ngày</option><option value="90">90 ngày</option><option value="0">Tất cả</option></select>
  <span style="font-size:11px;color:var(--g4);margin-left:auto" id="logCount">—</span>
</div>
<div class="log-wrap"><table class="log-tbl"><thead><tr><th>Thời gian</th><th>Admin</th><th>Hành động</th><th>User bị sửa</th><th>Chi tiết thay đổi</th></tr></thead><tbody id="logBody"><tr><td colspan="5" class="log-empty">Nhấn tab Log để tải</td></tr></tbody></table></div>
</div>
