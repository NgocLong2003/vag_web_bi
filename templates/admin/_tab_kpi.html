<!-- ══ TAB: KPI ══ -->
<div class="tab-content" id="tab-kpi">
<style>
#tab-kpi{max-width:none!important;padding:0!important;height:calc(100vh - 108px)}
#tab-kpi.active{display:flex;flex-direction:column}
.kpi-toolbar{display:flex;align-items:center;gap:8px;padding:8px 16px;flex-wrap:wrap;border-bottom:1px solid var(--g2);background:var(--white);flex-shrink:0}
.kpi-toolbar select,.kpi-toolbar button{height:32px;font-family:var(--sans)}
.kpi-toolbar select{padding:0 8px;border:1.5px solid var(--g2);border-radius:6px;font-size:12px;outline:none;background:var(--white)}.kpi-toolbar select:focus{border-color:var(--blue)}
.kpi-tbtn{padding:0 12px;border-radius:6px;border:1px solid var(--g2);background:var(--white);font-size:11px;font-weight:600;color:var(--g5);cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap;height:32px}.kpi-tbtn:hover{background:var(--g1)}.kpi-tbtn svg{width:12px;height:12px;stroke:currentColor;fill:none}
.kpi-tbtn.green{border-color:#2db87e;color:var(--green)}.kpi-tbtn.green:hover{background:var(--green-lt)}
.kpi-stats{font-size:11px;color:var(--g4)}
/* Chốt toggle */
.kpi-chot-wrap{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.kpi-chot-wrap input{display:none}
.kpi-chot-slider{position:relative;width:32px;height:18px;background:var(--g2);border-radius:18px;transition:.2s;flex-shrink:0}
.kpi-chot-slider::before{content:'';position:absolute;width:14px;height:14px;left:2px;bottom:2px;background:var(--white);border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.kpi-chot-wrap input:checked+.kpi-chot-slider{background:var(--green)}
.kpi-chot-wrap input:checked+.kpi-chot-slider::before{transform:translateX(14px)}
.kpi-chot-label{font-size:11px;font-weight:700;color:var(--g4)}
.kpi-chot-wrap input:checked~.kpi-chot-label{color:var(--green)}
/* Save button */
.kpi-save-btn{border-color:var(--blue)!important;color:var(--blue)!important;font-weight:700!important}
.kpi-save-btn:hover{background:var(--blue-lt)!important}
.kpi-save-btn svg{width:12px;height:12px;stroke:var(--blue);fill:none}
/* Separator */
.kpi-sep{width:1px;height:20px;background:var(--g2);flex-shrink:0;margin:0 4px}

/* KBC Picker trigger */
.kbc-pick-trigger{height:32px;padding:0 10px;border:1.5px solid var(--g2);border-radius:6px;font-size:12px;font-family:var(--sans);background:var(--white);cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis}
.kbc-pick-trigger:hover{border-color:var(--blue)}
.kbc-pick-trigger .kbc-badge{font-size:9px;font-weight:800;padding:1px 5px;border-radius:6px;background:var(--blue);color:#fff;min-width:14px;text-align:center}
/* KBC dropdown panel */
.kbc-pick-panel{display:none;position:fixed;z-index:9999;background:var(--white);border:1px solid var(--g2);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.12);min-width:260px;max-height:400px;overflow-y:auto;padding:8px 0}
.kbc-pick-panel.show{display:block}
.kbc-pick-item{display:flex;align-items:center;gap:6px;padding:4px 12px;cursor:pointer;font-size:12px}.kbc-pick-item:hover{background:var(--g1)}
.kbc-pick-item input{width:14px;height:14px;cursor:pointer}
.kbc-pick-item label{cursor:pointer;flex:1}
.kbc-pick-item.lv0{font-weight:700;color:var(--purple)}.kbc-pick-item.lv1{padding-left:28px;font-weight:600;color:var(--blue)}.kbc-pick-item.lv2{padding-left:44px;color:var(--g5)}
.kbc-pick-footer{padding:6px 12px;border-top:1px solid var(--g1);display:flex;justify-content:space-between;align-items:center}
.kbc-pick-footer button{padding:4px 12px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--sans);border:none}
.kbc-pick-apply{background:var(--blue);color:#fff}.kbc-pick-clear{background:var(--g1);color:var(--g4)}

/* Main layout: left panel + content */
.kpi-main{display:flex;flex:1;overflow:hidden}
.kpi-left{width:280px;min-width:280px;border-right:1px solid var(--g2);background:var(--white);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
.kpi-left.hidden{display:none}
.kpi-left-header{padding:10px 12px;border-bottom:1px solid var(--g1);font-size:12px;font-weight:700;color:var(--g5);display:flex;justify-content:space-between;align-items:center}
.kpi-left-close{background:none;border:none;font-size:16px;color:var(--g4);cursor:pointer;padding:0 4px}.kpi-left-close:hover{color:var(--g6)}
.kpi-left-body{flex:1;overflow-y:auto;padding:8px 0}
.kpi-left-name{padding:4px 12px;font-size:14px;font-weight:700;color:var(--g6)}
.kpi-left-code{padding:0 12px 8px;font-size:10px;font-family:var(--mono);color:var(--g4)}
.kpi-left-section{padding:4px 12px;font-size:10px;font-weight:700;color:var(--g3);text-transform:uppercase;letter-spacing:.04em}
.kpi-left-row{display:flex;justify-content:space-between;align-items:center;padding:4px 12px;font-size:12px;border-bottom:1px solid var(--g1)}
.kpi-left-row:hover{background:var(--g1)}
.kpi-left-row .lbl{color:var(--g4);font-weight:600}
.kpi-left-row .val{font-family:var(--mono);font-size:11px;color:var(--g6);font-weight:600}
.kpi-left-row .val.zero{color:var(--g3)}
.kpi-left-empty{padding:40px 12px;text-align:center;color:var(--g4);font-size:12px}
.kpi-left-search{width:calc(100% - 24px);margin:8px 12px 4px;height:28px;padding:0 8px;border:1.5px solid var(--g2);border-radius:5px;font-size:11px;font-family:var(--sans);outline:none}.kpi-left-search:focus{border-color:var(--blue)}
.kpi-ua-item{display:flex;align-items:center;gap:6px;padding:6px 12px;border-bottom:1px solid var(--g1);cursor:grab;transition:background .08s;user-select:none}
.kpi-ua-item:hover{background:var(--blue-lt)}
.kpi-ua-item:active{cursor:grabbing;background:#dbeafe}
.kpi-ua-drag{color:var(--g3);font-size:11px;flex-shrink:0}
.kpi-ua-info{flex:1;min-width:0}
.kpi-ua-name{font-size:12px;font-weight:600;color:var(--g6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kpi-ua-meta{font-size:9px;color:var(--g4);font-family:var(--mono)}
.kpi-ua-count{font-size:10px;color:var(--g4);padding:0 12px 4px}

.kpi-content{flex:1;overflow:hidden;position:relative}
</style>

<!-- TOOLBAR -->
<div class="kpi-toolbar">
  <!-- KBC Picker (reuse shared component) -->
  <div class="kbc-wrap">
    <div class="kbc-trigger" id="kbc-trigger" onclick="toggleKbcPicker()">
      <svg viewBox="0 0 16 16" stroke-width="2"><rect x="2" y="3" width="12" height="11" rx="1.5"/><path d="M5 1v4m6-4v4"/><line x1="2" y1="7" x2="14" y2="7"/></svg>

    <span class="kpi-sep"></span>
    <button class="kpi-tbtn" onclick="document.getElementById('kpiExcelFile').click()"><svg viewBox="0 0 16 16" stroke-width="2"><path d="M8 10V2m0 0L5 5m3-3l3 3"/><path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2"/></svg>Import Excel</button>
    <input type="file" id="kpiExcelFile" accept=".xlsx,.xls" style="display:none" onchange="kpiImportExcel(this)">
    <button class="kpi-tbtn green" onclick="kpiExport()"><svg viewBox="0 0 16 16" stroke-width="2"><path d="M8 2v8m0 0l-3-3m3 3l3-3"/><path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2"/></svg>Export</button>
  </div>
</div>

<script>
var kbcList={{ ky_bao_cao | tojson }};
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}
function iso(d){if(!d)return null;return String(d).substring(0,10)}
function isMobile(){return window.innerWidth<=768}
function isLandscapePhone(){return window.innerWidth<=900&&window.innerHeight<500&&window.matchMedia('(hover:none)').matches}
function onKBCSelected(){
    var months=kbcList.filter(function(k){return k.loai_kbc==='Tháng'&&_kbcChecked.has(k.id)});
    window._kpiSelectedKbcs=months.map(function(k){return k.ma_kbc});
    kpiLoad();
}
</script>

<!-- MAIN: LEFT PANEL + CONTENT -->
<div class="kpi-main">
  <div class="kpi-left" id="kpiLeftPanel">
    <div class="kpi-left-header">
      <span id="kpiLeftTitle">Chưa phân công</span>
      <button class="kpi-left-close" onclick="kpiCloseLeft()">✕</button>
    </div>
    <div class="kpi-left-body" id="kpiLeftBody">
      <div class="kpi-left-empty">Đang tải...</div>
    </div>
  </div>
  <div class="kpi-content">

<script>
/* ═══ Shared KPI state ═══ */
(function(){
var assignments=[], kpiData={}, nodeMap={}, byParent={}, expanded={};
var detailData={}, ratiosData={};
var FMT=new Intl.NumberFormat('vi-VN',{maximumFractionDigits:0});
function fN(v){return v==null||isNaN(v)?'—':FMT.format(Math.round(v))}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function buildTree(){
    nodeMap={};byParent={};
    assignments.forEach(function(a){nodeMap[a.ma_nvkd]=a});
    assignments.forEach(function(a){
        var pid=a.ma_ql||'__ROOT__';
        if(pid&&pid!=='__ROOT__'&&!nodeMap[pid])pid='__ROOT__';
        if(!byParent[pid])byParent[pid]=[];
        byParent[pid].push(a);
    });
}
function getChildSum(ma,field){
    var kids=byParent[ma];if(!kids||!kids.length)return null;
    var s=0;kids.forEach(function(c){s+=((kpiData[c.ma_nvkd]||{})[field]||0)});return s;
}
window._kpi={
    get assignments(){return assignments}, set assignments(v){assignments=v},
    get kpiData(){return kpiData}, set kpiData(v){kpiData=v},
    get detailData(){return detailData}, set detailData(v){detailData=v},
    get nodeMap(){return nodeMap}, get byParent(){return byParent},
    get expanded(){return expanded}, get selectedKbcs(){return getSelectedKbcs()},
    fN:fN, esc:esc, buildTree:buildTree, getChildSum:getChildSum, FMT:FMT,
    getKbc:function(){var selectedKbcs=getSelectedKbcs();return selectedKbcs.length===1?selectedKbcs[0]:(selectedKbcs[0]||'')},
    getKbcs:function(){return getSelectedKbcs()},
    getBp:function(){return document.getElementById('kpiBp').value||''}
};
function getSelectedKbcs(){return window._kpiSelectedKbcs||[]}

function renderGraph(){if(typeof window.kpiRenderGraph==='function')window.kpiRenderGraph()}

/* Load data */
window.kpiLoad=function(){
    var kbcs=getSelectedKbcs(),mbp=window._kpi.getBp();if(!kbcs.length)return;
    var qp=kbcs.map(function(k){return'ma_kbc='+encodeURIComponent(k)}).join('&');
    if(mbp)qp+='&ma_bp='+encodeURIComponent(mbp);
    fetch('/admin/kpi/data?'+qp).then(function(r){return r.json()}).then(function(d){
        if(!d.ok){if(d.error)alert('Lỗi: '+d.error);return}
        assignments=d.assignments||[];kpiData=d.kpi||{};detailData=d.detail||{};ratiosData=d.ratios||{};
        _uaData=d.unassigned||[];_uaLoaded=true;
        buildTree();
        if(typeof window._kpiResetExpand==='function')window._kpiResetExpand(!!mbp);
        renderGraph();kpiShowUnassigned();
        // Show/hide chốt+lưu (only for single kỳ)
        var isSingle=kbcs.length===1;
        document.getElementById('kpiChotWrap').style.display=isSingle?'':'none';
        document.getElementById('kpiSaveBtn').style.display=isSingle?'':'none';
        if(isSingle){
            // Fetch chot status
            fetch('/admin/kpi/chot-status?ma_kbc='+encodeURIComponent(kbcs[0])).then(function(r){return r.json()}).then(function(cd){
                if(cd.ok)document.getElementById('kpiChotCb').checked=!!cd.chot;
            });
        }
    });
};

/* Chốt toggle changed (visual only — actual save on Lưu) */
window.kpiChotChanged=function(){};

/* Lưu: save chốt status + trigger sync to subsequent unlocked periods */
window.kpiSave=function(){
    var kbcs=getSelectedKbcs();if(kbcs.length!==1)return;
    var kbc=kbcs[0];
    var chot=document.getElementById('kpiChotCb').checked?1:0;
    var mbp=window._kpi.getBp();
    var btn=document.getElementById('kpiSaveBtn');
    btn.textContent='Đang lưu...';btn.disabled=true;
    fetch('/admin/kpi/save-chot',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ma_kbc:kbc,chot:chot,ma_bp:mbp})
    }).then(function(r){return r.json()}).then(function(d){
        btn.disabled=false;btn.innerHTML='<svg viewBox="0 0 16 16" stroke-width="2"><path d="M12.5 2H4a1.5 1.5 0 00-1.5 1.5v9A1.5 1.5 0 004 14h8a1.5 1.5 0 001.5-1.5V5L12.5 2z"/><path d="M10 14V9H6v5"/><path d="M6 2v3h5"/></svg>Lưu';
        if(d.ok){
            var msg='Đã lưu';
            if(d.synced&&d.synced.length)msg+='. Đồng bộ kiến trúc → '+d.synced.join(', ');
            document.getElementById('kpiStats').textContent=msg;
            setTimeout(function(){document.getElementById('kpiStats').textContent='—'},5000);
        }else{alert('Lỗi: '+(d.error||''))}
    }).catch(function(e){btn.disabled=false;btn.textContent='Lưu';alert('Lỗi: '+e.message)});
};
/* Left panel */
function parseRatio(s){s=String(s||'').trim();if(s.indexOf('/')>=0){var p=s.split('/');var n=parseFloat(p[0]),d=parseFloat(p[1]);if(d&&!isNaN(n))return n/d}return parseFloat(s)||1}
function fR(v){return v?v.toFixed(4):'—'}

window.kpiShowDetail=function(ma){
    var a=nodeMap[ma];if(!a)return;
    document.getElementById('kpiLeftPanel').classList.remove('hidden');
    document.getElementById('kpiLeftTitle').textContent='Chi tiết';
    var det=detailData[ma]||{};
    var mons=Object.keys(det).sort(function(a,b){return parseInt(b.replace(/[^\d]/g,''))-parseInt(a.replace(/[^\d]/g,''))});
    var nvBp=a.ma_bp||'';
    var parentNode=nodeMap[a.ma_ql];
    var isBpRoot=!a.ma_ql||a.ma_ql===''||!parentNode||(parentNode&&!parentNode.ma_ql);
    var isCompanyRoot=!a.ma_ql||a.ma_ql==='';
    var bpRatios=ratiosData[nvBp]||{};
    var RF=[{key:'ratio_dt_cty',kf:'kpi_cong_ty',label:'DT Công ty'},{key:'ratio_ds_nb',kf:'kpi_ds',label:'DS Nội bộ'},{key:'ratio_ds_cty',kf:'kpi_ds_cong_ty',label:'DS Công ty'}];

    var h='<div class="kpi-left-name">'+esc(a.ten_nvkd)+'</div>';
    h+='<div class="kpi-left-code">'+esc(ma)+' · QL: '+esc(a.ma_ql||'(gốc)')+' · BP: '+esc(nvBp)+'</div>';

    var totKpi=0;mons.forEach(function(m){totKpi+=(det[m]||{}).kpi||0});
    h+='<div class="kpi-left-row" style="background:var(--blue-lt);margin-top:8px"><span class="lbl" style="font-weight:800">DT Nội bộ</span><span class="val" style="font-weight:800">'+fN(totKpi)+'</span></div>';
    mons.forEach(function(m){
        var v=(det[m]||{}).kpi||0;
        h+='<div class="kpi-left-row"><span class="lbl">'+esc(m)+'</span>';
        h+='<span class="val kpi-left-editable'+(v?'':' zero')+'" data-ma="'+esc(ma)+'" data-kbc="'+esc(m)+'" data-field="kpi" style="cursor:pointer" title="Click để sửa">'+fN(v)+'</span></div>';
    });

    RF.forEach(function(rf){
        var totF=0;mons.forEach(function(m){totF+=(det[m]||{})[rf.kf]||0});
        h+='<div class="kpi-left-row" style="background:var(--blue-lt);margin-top:8px"><span class="lbl" style="font-weight:800">'+rf.label+'</span><span class="val" style="font-weight:800">'+fN(totF)+'</span></div>';
        mons.forEach(function(m){
            var v=(det[m]||{})[rf.kf]||0;
            var baseV=(det[m]||{}).kpi||0;
            var r=(bpRatios[m]||{})[rf.key]||0;
            var canEdit=isBpRoot&&!isCompanyRoot;
            h+='<div class="kpi-left-row" style="display:flex;gap:2px;align-items:center">';
            h+='<span class="lbl" style="min-width:56px">'+esc(m)+'</span>';
            if(canEdit){
                h+='<span class="val kpi-ratio-edit" data-bp="'+esc(nvBp)+'" data-kbc="'+esc(m)+'" data-rkey="'+rf.key+'" style="cursor:pointer;color:var(--blue);min-width:50px;text-align:center;font-size:9px" title="Tỷ lệ (hỗ trợ phân số: 72/68.5)">'+fR(r)+'</span>';
                h+='<span class="val kpi-val-edit'+(v?'':' zero')+'" data-ma="'+esc(ma)+'" data-kbc="'+esc(m)+'" data-field="'+rf.kf+'" data-rkey="'+rf.key+'" data-bp="'+esc(nvBp)+'" style="cursor:pointer;flex:1" title="Sửa giá trị → tỷ lệ tự tính">'+fN(v)+'</span>';
            }else{
                h+='<span style="font-family:var(--mono);font-size:9px;color:var(--g3);min-width:50px;text-align:center">'+fR(r)+'</span>';
                h+='<span class="val'+(v?'':' zero')+'" style="flex:1">'+fN(v)+'</span>';
            }
            h+='</div>';
        });
    });

    document.getElementById('kpiLeftBody').innerHTML=h;
    document.querySelectorAll('.kpi-left-editable').forEach(function(el){el.addEventListener('click',function(){kpiLeftEdit(this)})});
    document.querySelectorAll('.kpi-ratio-edit').forEach(function(el){el.addEventListener('click',function(){kpiRatioEdit(this)})});
    document.querySelectorAll('.kpi-val-edit').forEach(function(el){el.addEventListener('click',function(){kpiValEdit(this)})});
};

/* Edit DT Nội bộ */
function kpiLeftEdit(el){
    var ma=el.dataset.ma,kbc=el.dataset.kbc,field=el.dataset.field;
    var cur=(detailData[ma]||{})[kbc]||{};var curVal=cur[field]||0;var oldText=el.textContent;
    var inp=document.createElement('input');inp.type='text';inp.value=curVal?FMT.format(Math.round(curVal)):'';
    inp.style.cssText='width:100%;height:22px;padding:0 4px;border:1.5px solid var(--blue);border-radius:3px;font-family:var(--mono);font-size:11px;text-align:right;outline:none;background:#fff;color:var(--g6);';
    el.textContent='';el.appendChild(inp);inp.focus();inp.select();
    inp.addEventListener('input',function(){var c=this.selectionStart,ol=this.value.length,raw=this.value.replace(/[^\d]/g,'');this.value=raw?FMT.format(parseInt(raw)):'';this.setSelectionRange(Math.max(0,c+(this.value.length-ol)),Math.max(0,c+(this.value.length-ol)))});
    var saved=false;
    function save(){if(saved)return;saved=true;
        var nv=parseFloat(inp.value.replace(/[^\d]/g,''))||0;
        if(!detailData[ma])detailData[ma]={};if(!detailData[ma][kbc])detailData[ma][kbc]={kpi:0,kpi_cong_ty:0,kpi_ds:0,kpi_ds_cong_ty:0};
        detailData[ma][kbc][field]=nv;
        var total=0;Object.keys(detailData[ma]||{}).forEach(function(k){total+=(detailData[ma][k]||{})[field]||0});
        if(!kpiData[ma])kpiData[ma]={kpi:0,kpi_cong_ty:0,kpi_ds:0,kpi_ds_cong_ty:0};kpiData[ma][field]=total;
        fetch('/admin/kpi/save-cell',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ma_kbc:kbc,ma_nvkd:ma,field:field,value:nv})}).then(function(r){return r.json()}).then(function(d){
            if(d.calc){if(!detailData[ma][kbc])detailData[ma][kbc]={};['kpi_cong_ty','kpi_ds','kpi_ds_cong_ty'].forEach(function(f){if(d.calc[f]!==undefined){detailData[ma][kbc][f]=d.calc[f];var t=0;Object.keys(detailData[ma]).forEach(function(k){t+=(detailData[ma][k]||{})[f]||0});kpiData[ma][f]=t}});kpiShowDetail(ma)}
            renderGraph();
        });el.textContent=fN(nv);
    }
    inp.addEventListener('blur',save);inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();inp.blur()}if(e.key==='Escape'){saved=true;el.textContent=oldText}});
}

/* Edit ratio */
function kpiRatioEdit(el){
    var bp=el.dataset.bp,kbc=el.dataset.kbc,rkey=el.dataset.rkey;
    var curR=(ratiosData[bp]||{})[kbc]||{};var curVal=curR[rkey]||1;var oldText=el.textContent;
    var inp=document.createElement('input');inp.type='text';inp.value=curVal.toFixed(4);inp.placeholder='1.04 or 72/68.5';
    inp.style.cssText='width:58px;height:20px;padding:0 3px;border:1.5px solid var(--blue);border-radius:3px;font-family:var(--mono);font-size:10px;text-align:center;outline:none;background:#fff;color:var(--blue);';
    el.textContent='';el.appendChild(inp);inp.focus();inp.select();
    var saved=false;
    function save(){if(saved)return;saved=true;
        var nv=parseRatio(inp.value);
        if(!ratiosData[bp])ratiosData[bp]={};if(!ratiosData[bp][kbc])ratiosData[bp][kbc]={ratio_dt_cty:1,ratio_ds_nb:1,ratio_ds_cty:1};
        ratiosData[bp][kbc][rkey]=nv;
        var pl={ma_bp:bp,ma_kbc:kbc,ratio_dt_cty:ratiosData[bp][kbc].ratio_dt_cty,ratio_ds_nb:ratiosData[bp][kbc].ratio_ds_nb,ratio_ds_cty:ratiosData[bp][kbc].ratio_ds_cty};
        fetch('/admin/kpi/ratios/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(pl)}).then(function(r){return r.json()}).then(function(d){if(d.ok)kpiLoad();else alert('Lỗi: '+(d.error||''))});
        el.textContent=fR(nv);
    }
    inp.addEventListener('blur',save);inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();inp.blur()}if(e.key==='Escape'){saved=true;el.textContent=oldText}});
}

/* Edit result value → reverse-calc ratio */
function kpiValEdit(el){
    var ma=el.dataset.ma,kbc=el.dataset.kbc,field=el.dataset.field,rkey=el.dataset.rkey,bp=el.dataset.bp;
    var cur=(detailData[ma]||{})[kbc]||{};var curVal=cur[field]||0;var baseVal=cur.kpi||0;var oldText=el.textContent;
    var inp=document.createElement('input');inp.type='text';inp.value=curVal?FMT.format(Math.round(curVal)):'';
    inp.style.cssText='width:100%;height:22px;padding:0 4px;border:1.5px solid var(--blue);border-radius:3px;font-family:var(--mono);font-size:11px;text-align:right;outline:none;background:#fff;color:var(--g6);';
    el.textContent='';el.appendChild(inp);inp.focus();inp.select();
    inp.addEventListener('input',function(){var c=this.selectionStart,ol=this.value.length,raw=this.value.replace(/[^\d]/g,'');this.value=raw?FMT.format(parseInt(raw)):'';this.setSelectionRange(Math.max(0,c+(this.value.length-ol)),Math.max(0,c+(this.value.length-ol)))});
    var saved=false;
    function save(){if(saved)return;saved=true;
        var nv=parseFloat(inp.value.replace(/[^\d]/g,''))||0;
        if(baseVal>0&&nv>0){
            var newR=nv/baseVal;
            if(!ratiosData[bp])ratiosData[bp]={};if(!ratiosData[bp][kbc])ratiosData[bp][kbc]={ratio_dt_cty:1,ratio_ds_nb:1,ratio_ds_cty:1};
            ratiosData[bp][kbc][rkey]=newR;
            var pl={ma_bp:bp,ma_kbc:kbc,ratio_dt_cty:ratiosData[bp][kbc].ratio_dt_cty,ratio_ds_nb:ratiosData[bp][kbc].ratio_ds_nb,ratio_ds_cty:ratiosData[bp][kbc].ratio_ds_cty};
            fetch('/admin/kpi/ratios/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(pl)}).then(function(r){return r.json()}).then(function(d){if(d.ok)kpiLoad();else alert('Lỗi: '+(d.error||''))});
        }else{
            fetch('/admin/kpi/save-cell',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ma_kbc:kbc,ma_nvkd:ma,field:field,value:nv})});
        }
        el.textContent=fN(nv);
    }
    inp.addEventListener('blur',save);inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();inp.blur()}if(e.key==='Escape'){saved=true;el.textContent=oldText}});
}
window.kpiCloseLeft=function(){kpiShowUnassigned()};

/* Unassigned panel */
var _uaData=[];var _uaLoaded=false;
window.kpiShowUnassigned=function(){
    document.getElementById('kpiLeftPanel').classList.remove('hidden');
    document.getElementById('kpiLeftTitle').textContent='Chưa phân công';
    var body=document.getElementById('kpiLeftBody');
    body.innerHTML='<input class="kpi-left-search" type="text" id="uaSearchInput" placeholder="Tìm NV..." oninput="filterUnassigned()">'
        +'<div class="kpi-ua-count" id="uaCount"></div>'
        +'<div id="uaList"></div>';
    filterUnassigned();
};
function filterUnassigned(){
    var inp=document.getElementById('uaSearchInput');
    var q=inp?(inp.value||'').toLowerCase().trim():'';
    var filtered=q?_uaData.filter(function(nv){return(nv.ten_nvkd+' '+nv.ma_nvkd+' '+nv.ma_bp).toLowerCase().indexOf(q)>=0}):_uaData;
    var countEl=document.getElementById('uaCount');
    if(countEl)countEl.textContent=filtered.length+'/'+_uaData.length+' NV chưa có KPI';
    var h='';
    if(!filtered.length){h='<div class="kpi-left-empty">Không có NV nào</div>'}
    filtered.forEach(function(nv){
        h+='<div class="kpi-ua-item" draggable="true" data-ma="'+esc(nv.ma_nvkd)+'" data-ten="'+esc(nv.ten_nvkd)+'" data-ql="'+esc(nv.ma_ql)+'" data-bp="'+esc(nv.ma_bp)+'">';
        h+='<span class="kpi-ua-drag">☰</span>';
        h+='<div class="kpi-ua-info"><div class="kpi-ua-name">'+esc(nv.ten_nvkd)+'</div><div class="kpi-ua-meta">'+esc(nv.ma_nvkd)+' · QL: '+esc(nv.ma_ql||'—')+' · '+esc(nv.ma_bp)+'</div></div>';
        h+='</div>';
    });
    var listEl=document.getElementById('uaList');
    if(listEl)listEl.innerHTML=h;
    document.querySelectorAll('.kpi-ua-item').forEach(function(el){
        el.addEventListener('dragstart',function(e){
            e.dataTransfer.effectAllowed='copy';
            e.dataTransfer.setData('application/json',JSON.stringify({
                ma_nvkd:this.dataset.ma,ten_nvkd:this.dataset.ten,
                ma_ql:this.dataset.ql,ma_bp:this.dataset.bp
            }));
            e.dataTransfer.setData('text/plain',this.dataset.ma);
            this.style.opacity='0.4';
        });
        el.addEventListener('dragend',function(){this.style.opacity=''});
    });
}
window.filterUnassigned=filterUnassigned;
