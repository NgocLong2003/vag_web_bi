<!-- _sidebar_css.html -->
<style>
:root {
    --header-h: 40px;
    --sb-collapsed: 48px;
    --sb-expanded: 280px;
    --sb-ease: .25s cubic-bezier(.4,0,.2,1);

    --sb-bg: #f6f7f9;
    --sb-hover: #eceef3;
    --sb-active-bg: #e0e7ff;
    --sb-text: #7c8290;
    --sb-text-hover: #3b4252;
    --sb-text-active: #3b5bdb;
    --sb-accent: #3b5bdb;
    --sb-border: #dfe1e6;
    --sb-section-text: #a0a6b1;
    --sb-desc-text: #9aa0ad;
    --sb-danger: #e03131;
}

/* ── Split view: push everything right ── */
html { padding-left: var(--sb-collapsed); }
.vbi-topbar { left: var(--sb-collapsed) !important; }
.sb-aware {
    left: var(--sb-collapsed) !important;
    width: calc(100vw - var(--sb-collapsed)) !important;
}

/* ═══ Sidebar ═══ */
.sb {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: var(--sb-collapsed);
    background: var(--sb-bg);
    display: flex; flex-direction: column;
    z-index: 200;
    border-right: 1px solid var(--sb-border);
    overflow: hidden;
    transition: width var(--sb-ease);
    will-change: width;
}
.sb:hover, .sb.pinned {
    width: var(--sb-expanded);
    box-shadow: 3px 0 16px rgba(0,0,0,.06);
}

/* ── Labels ── */
.sb-label {
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    opacity: 0; transition: opacity .12s; min-width: 0; flex: 1;
}
.sb:hover .sb-label, .sb.pinned .sb-label { opacity: 1; }

/* ═══ Profile ═══ */
.sb-profile {
    display: flex; align-items: center; gap: 8px;
    height: 48px; padding: 0 7px; flex-shrink: 0;
    border-bottom: 1px solid var(--sb-border);
}
.sb-avatar {
    width: 32px; height: 32px; min-width: 32px; border-radius: 8px;
    background: linear-gradient(135deg, #3b5bdb, #7048e8);
    color: #fff; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
}
.sb-username { font-size: 12px; font-weight: 600; color: #2b3040; }

/* ═══ Item ═══ */
.sb-item {
    display: flex; align-items: center; gap: 8px;
    height: 36px; min-height: 36px;
    padding: 0 7px; margin: 1px 4px; border-radius: 7px;
    text-decoration: none; color: var(--sb-text);
    font-size: 12.5px; font-weight: 500;
    transition: background .1s, color .1s;
    cursor: pointer; position: relative; flex-shrink: 0;
}
.sb-item:hover { background: var(--sb-hover); color: var(--sb-text-hover); }
.sb-item.active {
    background: var(--sb-active-bg); color: var(--sb-text-active); font-weight: 600;
}
.sb-item.active::before {
    content: ''; position: absolute; left: -4px; top: 50%; transform: translateY(-50%);
    width: 3px; height: 18px; border-radius: 0 2px 2px 0;
    background: var(--sb-accent);
}

.sb-icon {
    width: 32px; min-width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.sb-icon svg {
    width: 17px; height: 17px; stroke: currentColor; fill: none;
    stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
}

/* Item with description */
.sb-item-col {
    height: auto; min-height: 38px; padding-top: 6px; padding-bottom: 6px;
}
.sb-item-col .sb-label-wrap {
    display: flex; flex-direction: column; gap: 1px;
    opacity: 0; transition: opacity .12s; min-width: 0; flex: 1; overflow: hidden;
}
.sb:hover .sb-item-col .sb-label-wrap,
.sb.pinned .sb-item-col .sb-label-wrap { opacity: 1; }
.sb-item-name {
    font-size: 12.5px; font-weight: 500; color: inherit;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sb-item-desc {
    font-size: 10px; color: var(--sb-desc-text); font-weight: 400;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sb-item.active .sb-item-name { font-weight: 600; }

/* ═══ Sections ═══ */
.sb-section { padding: 1px 0; }
.sb-section-label {
    height: 24px; display: flex; align-items: center;
    padding: 0 7px; margin: 2px 4px 0; overflow: hidden;
}
.sb-section-label .sb-label {
    font-size: 10px; font-weight: 700;
    color: var(--sb-section-text);
    text-transform: uppercase; letter-spacing: .05em;
}

/* ═══ Dashboard scroll area — fills ALL remaining space ═══ */
.sb-dashboards {
    flex: 1; min-height: 0;
    overflow-y: auto; overflow-x: hidden;
    padding: 2px 0;
    border-top: 1px solid var(--sb-border);
    scrollbar-width: thin; scrollbar-color: rgba(0,0,0,.06) transparent;
}
.sb-dashboards::-webkit-scrollbar { width: 3px; }
.sb-dashboards::-webkit-scrollbar-thumb { background: rgba(0,0,0,.06); border-radius: 3px; }

/* ═══ Bottom actions — directly after dashboard list ═══ */
.sb-bottom {
    border-top: 1px solid var(--sb-border);
    padding: 3px 0 6px; flex-shrink: 0;
}
.sb-logout { color: var(--sb-danger); }
.sb-logout:hover { background: #fff0f0; color: #c92a2a; }

/* ═══ Tooltip (collapsed only) ═══ */
.sb-item[data-tip]::after {
    content: attr(data-tip);
    position: absolute; left: calc(var(--sb-collapsed) - 4px + 6px); top: 50%;
    transform: translateY(-50%);
    background: #2b3040; color: #fff; font-size: 11px; font-weight: 500;
    padding: 4px 9px; border-radius: 5px;
    white-space: nowrap; pointer-events: none;
    box-shadow: 0 3px 10px rgba(0,0,0,.12);
    opacity: 0; transition: opacity .1s; z-index: 210;
}
.sb:not(:hover):not(.pinned) .sb-item[data-tip]:hover::after { opacity: 1; }

/* ═══ Overlay (mobile) ═══ */
.sb-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.2); z-index: 190;
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
}
.sb-overlay.open { opacity: 1; pointer-events: auto; }

/* ═══ Toolbar slim (minimal overrides — page CSS controls layout) ═══ */

/* Sidebar replaces hamburger — hide it and its adjacent divider */
.hamburger-btn { display: none !important; }
.hamburger-btn + .v-div { display: none !important; }

/* ═══ MOBILE ═══ */
@media (max-width: 768px) {
    html { padding-left: 0; }
    :root { --header-h: 44px; }
    .vbi-topbar { left: 0 !important; }
    .sb-aware { left: 0 !important; width: 100vw !important; }
    .sb {
        width: 0; transform: translateX(calc(-1 * var(--sb-expanded)));
        border-right: none;
    }
    .sb:hover { width: 0; }
    .sb.pinned {
        width: var(--sb-expanded); transform: translateX(0);
        box-shadow: 4px 0 20px rgba(0,0,0,.08);
    }
    .sb.pinned .sb-label,
    .sb.pinned .sb-item-col .sb-label-wrap { opacity: 1; }
    .sb-item::after { display: none; }
}

/* ═══ Phone landscape ═══ */
@media (orientation: landscape) and (max-height: 500px) and (hover: none) {
    html { padding-left: 0; }
    .vbi-topbar { left: 0 !important; }
    .sb-aware { left: 0 !important; width: 100vw !important; }
    .sb {
        width: 0; transform: translateX(calc(-1 * var(--sb-expanded)));
        border-right: none;
    }
    .sb:hover { width: 0; }
    .sb.pinned {
        width: var(--sb-expanded); transform: translateX(0);
        box-shadow: 4px 0 20px rgba(0,0,0,.08);
    }
    .sb-item { height: 32px; min-height: 32px; font-size: 11.5px; }
    .sb-item-col { min-height: 34px; padding-top: 5px; padding-bottom: 5px; }
    .sb-icon { width: 28px; min-width: 28px; height: 28px; }
    .sb-icon svg { width: 15px; height: 15px; }
    .sb-item::after { display: none; }
}
</style>
