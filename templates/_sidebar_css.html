<!-- _sidebar_css.html -->
<style>
/* ═══ Hamburger ═══ */
.hamburger-btn{width:34px;height:34px;border:1.5px solid var(--g2,#d5d9e4);border-radius:7px;background:var(--white,#fff);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
.hamburger-btn:hover{background:var(--g1,#eceef3);border-color:var(--g3,#a8b0c5)}
.hamburger-btn svg{width:18px;height:18px;stroke:var(--g5,#414e6a);fill:none;stroke-linecap:round;stroke-width:2}

/* ═══ Overlay ═══ */
.sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9998;opacity:0;pointer-events:none;transition:opacity .25s}
.sb-overlay.open{opacity:1;pointer-events:auto}

/* ═══ Sidebar panel (slide from LEFT) ═══ */
.sb-menu{position:fixed;top:0;left:0;bottom:0;width:300px;max-width:85vw;background:#1a1d2e;color:rgba(255,255,255,.85);z-index:9999;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.sb-menu.open{transform:translateX(0)}

/* Head */
.sb-head{padding:16px 16px 14px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-user{font-size:14px;font-weight:700;color:#fff}
.sb-close{width:28px;height:28px;border:none;background:rgba(255,255,255,.08);border-radius:6px;cursor:pointer;font-size:14px;color:rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;transition:.12s}
.sb-close:hover{background:rgba(255,255,255,.15);color:#fff}

/* Body — scrollable dashboard list */
.sb-body{flex:1;overflow-y:auto;padding:4px 0}

/* Footer — sticky bottom */
.sb-footer{padding:6px 0 12px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0}

/* Section */
.sb-section{padding:4px 0}
.sb-section-label{padding:8px 16px 4px;font-size:10px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.06em}

/* Item */
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 16px;text-decoration:none;color:rgba(255,255,255,.7);font-size:13px;font-weight:500;transition:.12s;cursor:pointer}
.sb-item:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-item.active{background:rgba(255,255,255,.1);color:#fff;font-weight:700}
.sb-item svg{width:18px;height:18px;stroke:currentColor;fill:none;flex-shrink:0}
.sb-desc{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px}
.sb-home{border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:4px;padding-bottom:12px}
.sb-logout{color:rgba(255,120,120,.9)}
.sb-logout:hover{background:rgba(255,80,80,.1);color:rgba(255,120,120,1)}

/* ═══ Toolbar slim ═══ */
.toolbar-slim{height:42px;background:var(--white,#fff);border-bottom:1px solid var(--g2,#d5d9e4);display:flex;align-items:center;gap:6px;padding:0 10px;flex-shrink:0;z-index:50}
.toolbar-slim .spacer{flex:1;min-width:0}
.toolbar-slim .tbtn{height:30px;padding:0 10px;font-size:11px}
.toolbar-title{font-size:14px;font-weight:700;color:var(--g6,#28334d);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}

/* Mobile: ẩn toolbar-slim */
@media(max-width:768px){
  .toolbar-slim{display:none}
}
</style>
