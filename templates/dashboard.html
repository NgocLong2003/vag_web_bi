<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ dashboard_name }} - VietAnh BI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f4f5f7;
            overflow: hidden;
            height: 100vh;
        }

        /* --- TOP BAR --- */
        .top-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 14px; height: 42px; background: #1a1a2e; color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15); user-select: none; z-index: 60;
            position: relative;
        }
        .top-bar .left { display: flex; align-items: center; gap: 0; }
        .top-bar .user-info { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .top-btn {
            padding: 4px 12px; background: rgba(255,255,255,0.1); color: #fff;
            border: 1px solid rgba(255,255,255,0.18); border-radius: 5px; font-size: 11px;
            cursor: pointer; text-decoration: none; transition: background 0.2s;
        }
        .top-btn:hover { background: rgba(255,255,255,0.22); }

        /* Nút toàn màn hình */
        .fullscreen-btn {
            position: absolute; left: 50%; transform: translateX(-50%);
            padding: 4px 14px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 5px; font-size: 10px;
            font-weight: 600; letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s;
        }
        .fullscreen-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }

        /* Nút quay về /dashboards */
        .back-btn {
            display: flex; align-items: center; justify-content: center;
            width: 28px; height: 28px; border-radius: 5px; color: rgba(255,255,255,0.5);
            text-decoration: none; font-size: 15px; transition: all 0.15s; margin-right: 6px;
        }
        .back-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

        /* Dashboard selector dropdown */
        .dash-selector {
            position: relative;
        }
        .dash-selector-btn {
            display: flex; align-items: center; gap: 6px;
            background: none; border: none; color: #fff; cursor: pointer;
            font-size: 14px; font-weight: 600; padding: 5px 10px; border-radius: 5px;
            transition: background 0.15s;
        }
        .dash-selector-btn:hover { background: rgba(255,255,255,0.1); }
        .dash-selector-btn .arrow {
            font-size: 9px; opacity: 0.5; transition: transform 0.2s;
        }
        .dash-selector-btn.open .arrow { transform: rotate(180deg); }

        .dash-dropdown {
            display: none; position: absolute; top: 100%; left: 0; margin-top: 4px;
            background: #fff; border-radius: 8px; box-shadow: 0 8px 30px rgba(0,0,0,0.18);
            min-width: 260px; max-height: 360px; overflow-y: auto; z-index: 60;
            border: 1px solid #e8e8e8;
        }
        .dash-dropdown.show { display: block; }
        .dash-dropdown-item {
            display: block; padding: 10px 14px; text-decoration: none; color: #333;
            font-size: 13px; transition: background 0.1s; border-bottom: 1px solid #f5f5f5;
            cursor: pointer;
        }
        .dash-dropdown-item:last-child { border-bottom: none; }
        .dash-dropdown-item:hover { background: #f0f4ff; color: #0078d4; }
        .dash-dropdown-item.active { background: #e8f0fe; color: #0057a3; font-weight: 600; }
        .dash-dropdown-item .desc {
            font-size: 11px; color: #999; margin-top: 2px; font-weight: 400;
        }

        /* Backdrop đóng dropdown khi click ra ngoài */
        .dropdown-backdrop {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 55;
        }
        .dropdown-backdrop.show { display: block; }

        /* --- REPORT AREA --- */
        .report-wrapper {
            width: 100%; height: calc(100vh - 42px);
            overflow: hidden; position: relative; background: #e8e8e8;
        }
        .report-wrapper iframe {
            width: 100%; height: calc(100% + 50px);
            border: none; position: absolute; top: 0; left: 0;
        }
        #shield {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 5; cursor: default;
        }

        .loading-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: #f4f5f7; display: flex; align-items: center; justify-content: center;
            z-index: 10; transition: opacity 0.3s;
        }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }

        .spinner {
            width: 36px; height: 36px; border: 3px solid #ddd;
            border-top-color: #0078d4; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="left">
            <a href="/dashboards" class="back-btn" title="Tất cả Dashboard">&larr;</a>
            <div class="dash-selector">
                <button class="dash-selector-btn" id="dashSelectorBtn">
                    {{ dashboard_name }}
                    <span class="arrow">&#9660;</span>
                </button>
                <div class="dash-dropdown" id="dashDropdown">
                    {% for d in all_dashboards %}
                    <a href="{{ '/analytics' if d.slug == 'analytics' else '/d/' + d.slug }}" class="dash-dropdown-item {{ 'active' if d.slug == dashboard_slug else '' }}"
                       data-slug="{{ d.slug }}" data-name="{{ d.name }}" data-is-analytics="{{ 'true' if d.slug == 'analytics' else 'false' }}">
                        {{ d.name }}
                        {% if d.description %}
                        <div class="desc">{{ d.description }}</div>
                        {% endif %}
                    </a>
                    {% endfor %}
                </div>
            </div>
        </div>
        <button class="fullscreen-btn" id="fullscreenBtn" title="Toàn màn hình">TOÀN MÀN HÌNH</button>
        <div class="user-info">
            <span>{{ username }}</span>
            {% if role == 'admin' %}
            <a href="/admin" class="top-btn">Quản trị</a>
            {% endif %}
            <a href="/settings" class="top-btn">Cài đặt</a>
            <a href="/logout" class="top-btn">Đăng xuất</a>
        </div>
    </div>

    <!-- Backdrop đóng dropdown -->
    <div class="dropdown-backdrop" id="dropdownBackdrop"></div>

    <!-- REPORT -->
    <div class="report-wrapper" id="reportWrapper">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
        </div>
        <div id="shield"></div>
    </div>


    <script>
    (function(){

        // ============================================================
        // DROPDOWN CHỌN DASHBOARD
        // ============================================================
        var selectorBtn = document.getElementById('dashSelectorBtn');
        var dropdown = document.getElementById('dashDropdown');
        var backdrop = document.getElementById('dropdownBackdrop');

        function openDropdown() {
            dropdown.classList.add('show');
            backdrop.classList.add('show');
            selectorBtn.classList.add('open');
        }
        function closeDropdown() {
            dropdown.classList.remove('show');
            backdrop.classList.remove('show');
            selectorBtn.classList.remove('open');
        }

        selectorBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (dropdown.classList.contains('show')) closeDropdown();
            else openDropdown();
        });
        backdrop.addEventListener('click', closeDropdown);

        // ============================================================
        // SHIELD & SECURITY
        // ============================================================
        var shield = document.getElementById('shield');
        var wrapper = document.getElementById('reportWrapper');
        var shieldOff = false;

        function _kick() { window.location.replace('/logout'); }

        shield.addEventListener('contextmenu', function(e){ e.preventDefault(); _kick(); });
        shield.addEventListener('click', function(e){
            if (e.button === 0) { shieldOff = true; shield.style.display = 'none'; }
        });
        shield.addEventListener('mousedown', function(e){
            if (e.button === 2) { e.preventDefault(); _kick(); }
        });
        wrapper.addEventListener('mouseleave', function(){
            if (shieldOff) { shieldOff = false; shield.style.display = 'block'; }
        });
        window.addEventListener('focus', function(){
            if (shieldOff) { shieldOff = false; shield.style.display = 'block'; }
        });

        // Phím tắt
        document.addEventListener('keydown', function(e){
            var kick = false;
            if (e.key === 'F12') kick = true;
            if (e.ctrlKey && e.shiftKey && ['I','i','J','j','C','c'].indexOf(e.key) > -1) kick = true;
            if (e.ctrlKey && (e.key === 'u' || e.key === 'U')) kick = true;
            if (e.ctrlKey && (e.key === 's' || e.key === 'S')) kick = true;
            if (kick) { e.preventDefault(); e.stopPropagation(); _kick(); return false; }
        }, true);

        document.addEventListener('contextmenu', function(e){ e.preventDefault(); _kick(); }, true);

        // Debugger trap
        (function _d(){
            var t = new Date(); debugger;
            if (new Date() - t > 100) {
                document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:18px;color:#c62828;font-family:Segoe UI">Vui lòng đóng Developer Tools để tiếp tục sử dụng.</div>';
            }
            setTimeout(_d, 3000);
        })();

        ['log','info','warn','debug','dir','table'].forEach(function(m){ console[m] = function(){}; });

        // ============================================================
        // LOAD REPORT
        // ============================================================
        var _tk = '{{ session.token }}';
        var _currentSlug = '{{ dashboard_slug }}';
        var _w = document.getElementById('reportWrapper');
        var _lo = document.getElementById('loadingOverlay');
        var _currentIframe = null;

        function _dec(d) {
            try { var s1 = atob(d); var s2 = s1.split('').reverse().join(''); return atob(s2); }
            catch(e) { return ''; }
        }

        function loadReport(slug) {
            // Hiện loading
            _lo.classList.remove('hidden');

            // Xóa iframe cũ nếu có
            if (_currentIframe) {
                _currentIframe.remove();
                _currentIframe = null;
            }

            fetch('/api/report-url', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: _tk, slug: slug })
            })
            .then(function(r) { if (!r.ok) { window.location.href = '/login'; return; } return r.json(); })
            .then(function(data) {
                if (data && data.d) {
                    var u = _dec(data.d);
                    if (u) {
                        var f = document.createElement('iframe');
                        f.scrolling = 'no'; f.allowFullscreen = true;
                        f.style.cssText = 'width:100%;height:calc(100% + 50px);border:none;position:absolute;top:0;left:0;';
                        f.onload = function() { _lo.classList.add('hidden'); };
                        f.src = u;
                        _w.insertBefore(f, shield);
                        _currentIframe = f;
                        _currentSlug = slug;

                        // Update active state trong dropdown
                        var items = document.querySelectorAll('.dash-dropdown-item');
                        items.forEach(function(item) {
                            item.classList.toggle('active', item.getAttribute('data-slug') === slug);
                        });

                        // Update tên trên top bar
                        var activeItem = document.querySelector('.dash-dropdown-item[data-slug="'+slug+'"]');
                        if (activeItem) {
                            selectorBtn.childNodes[0].textContent = activeItem.getAttribute('data-name') + ' ';
                        }

                        // Update URL trên trình duyệt (không reload)
                        history.pushState(null, '', '/d/' + slug);
                    }
                }
            })
            .catch(function() { window.location.href = '/login'; });
        }

        // Click dropdown item → load dashboard inline hoặc navigate đến analytics
        document.querySelectorAll('.dash-dropdown-item').forEach(function(item) {
            item.addEventListener('click', function(e) {
                var slug = this.getAttribute('data-slug');
                var isAnalytics = this.getAttribute('data-is-analytics') === 'true';

                if (isAnalytics) {
                    // Analytics page → navigate bình thường
                    return;
                }

                if (slug === _currentSlug) {
                    e.preventDefault();
                    closeDropdown();
                    return;
                }
                e.preventDefault();
                closeDropdown();
                loadReport(slug);
            });
        });

        // Load dashboard ban đầu
        loadReport(_currentSlug);

        // ============================================================
        // TOÀN MÀN HÌNH
        // ============================================================
        var fsBtn = document.getElementById('fullscreenBtn');

        function updateFsBtn() {
            if (document.fullscreenElement) {
                fsBtn.textContent = 'THOÁT TOÀN MÀN HÌNH';
            } else {
                fsBtn.textContent = 'TOÀN MÀN HÌNH';
            }
        }

        fsBtn.addEventListener('click', function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(function(){});
            } else {
                document.exitFullscreen().catch(function(){});
            }
        });

        document.addEventListener('fullscreenchange', updateFsBtn);

        // DevTools size check
        setInterval(function(){
            if (window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) _kick();
        }, 1000);

    })();
    </script>

</body>
</html>
