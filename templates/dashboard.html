<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>{{ dashboard_name }} - VietAnh BI</title>
    {% include '_header_css.html' %}
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #e8e8e8;
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
        }

        .report-wrapper {
            width: 100%;
            height: calc(100vh - 40px);
            height: calc(100dvh - 40px);
            overflow: hidden;
            position: relative;
            background: #e8e8e8;
            /* Allow touch scroll on mobile for iframe content */
            -webkit-overflow-scrolling: touch;
        }
        .report-wrapper iframe {
            width: 100%;
            height: calc(100% + 50px); /* hide PBI footer on desktop */
            border: none;
            position: absolute;
            top: 0; left: 0;
        }

        #shield {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 5; cursor: default;
        }

        .loading-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: #f4f5f7;
            display: flex; align-items: center; justify-content: center;
            z-index: 10; transition: opacity 0.3s;
        }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #ddd; border-top-color: #0078d4;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ============================================================
           MOBILE PORTRAIT
           ============================================================ */
        @media (max-width: 768px) {
            .report-wrapper {
                /* Let iframe be taller and scrollable on mobile */
                height: calc(100vh - 40px);
                height: calc(100dvh - 40px);
                overflow: auto; /* allow scroll to see full report */
                -webkit-overflow-scrolling: touch;
            }
            .report-wrapper iframe {
                /* On mobile, make iframe tall enough to show full PBI report
                   PBI reports are typically ~1200-1600px tall on mobile.
                   We use a very tall frame so user can scroll to see everything. */
                position: relative;
                width: 100%;
                height: 1400px; /* tall enough for most PBI reports */
                min-height: calc(100dvh - 40px);
            }
            /* Auto-dismiss shield on mobile since right-click isn't a concern */
            #shield { display: none !important; }
        }

        /* ============================================================
           PHONE LANDSCAPE
           ============================================================ */
        @media (orientation: landscape) and (max-height: 500px) and (hover: none) {
            .report-wrapper {
                height: calc(100vh - 32px);
                height: calc(100dvh - 32px);
                overflow: auto;
                -webkit-overflow-scrolling: touch;
            }
            .report-wrapper iframe {
                position: relative;
                width: 100%;
                height: 900px; /* landscape: report is wider, less height needed */
                min-height: calc(100dvh - 32px);
            }
            #shield { display: none !important; }
        }
    </style>
</head>
<body>

    {% include '_header.html' %}

    <div class="report-wrapper" id="reportWrapper">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
        </div>
        <div id="shield"></div>
    </div>

    {% include '_header_js.html' %}

    <script>
    (function(){
        // ============================================================
        // SHIELD & SECURITY (desktop only — disabled on touch devices)
        // ============================================================
        var shield = document.getElementById('shield');
        var wrapper = document.getElementById('reportWrapper');
        var shieldOff = false;
        var isTouch = window.matchMedia('(hover: none)').matches;

        function _kick() { window.location.replace('/logout'); }

        if (!isTouch) {
            // Desktop-only shield logic
            shield.addEventListener('contextmenu', function(e){ e.preventDefault(); _kick(); });
            shield.addEventListener('click', function(e){
                if (e.button === 0) { shieldOff = true; shield.style.display = 'none'; }
            });
            shield.addEventListener('mousedown', function(e){
                if (e.button === 2) { e.preventDefault(); _kick(); }
            });
            wrapper.addEventListener('mouseleave', function(){
                if (shieldOff) { shieldOff = false; shield.style.display = 'block'; }
            });
            window.addEventListener('focus', function(){
                if (shieldOff) { shieldOff = false; shield.style.display = 'block'; }
            });
        }

        document.addEventListener('keydown', function(e){
            var kick = false;
            if (e.key === 'F12') kick = true;
            if (e.ctrlKey && e.shiftKey && ['I','i','J','j','C','c'].indexOf(e.key) > -1) kick = true;
            if (e.ctrlKey && (e.key === 'u' || e.key === 'U')) kick = true;
            if (e.ctrlKey && (e.key === 's' || e.key === 'S')) kick = true;
            if (kick) { e.preventDefault(); e.stopPropagation(); _kick(); return false; }
        }, true);

        if (!isTouch) {
            document.addEventListener('contextmenu', function(e){ e.preventDefault(); _kick(); }, true);
        }

        // Disable console (soft)
        ['log','info','warn','debug','dir','table'].forEach(function(m){ console[m] = function(){}; });

        // ============================================================
        // LOAD REPORT (Power BI)
        // ============================================================
        var _tk = '{{ session.token }}';
        var _currentSlug = '{{ dashboard_slug }}';
        var _w = document.getElementById('reportWrapper');
        var _lo = document.getElementById('loadingOverlay');
        var _currentIframe = null;

        var selectorBtn = document.getElementById('vbiSelectorBtn');

        function _dec(d) {
            try { var s1 = atob(d); var s2 = s1.split('').reverse().join(''); return atob(s2); }
            catch(e) { return ''; }
        }

        function getIframeStyle() {
            // On mobile: relative position, tall, scrollable
            // On desktop: absolute position, overflow hidden to crop PBI footer
            if (isTouch && window.innerWidth <= 768) {
                return 'width:100%;height:1400px;min-height:calc(100dvh - 40px);border:none;position:relative;';
            }
            if (isTouch && window.matchMedia('(orientation:landscape) and (max-height:500px)').matches) {
                return 'width:100%;height:900px;min-height:calc(100dvh - 32px);border:none;position:relative;';
            }
            return 'width:100%;height:calc(100% + 30px);border:none;position:absolute;top:0;left:0;';
        }

        function loadReport(slug) {
            _lo.classList.remove('hidden');
            if (_currentIframe) { _currentIframe.remove(); _currentIframe = null; }

            fetch('/api/report-url', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: _tk, slug: slug })
            })
            .then(function(r) { if (!r.ok) { window.location.href = '/login'; return; } return r.json(); })
            .then(function(data) {
                if (data && data.d) {
                    var u = _dec(data.d);
                    if (u) {
                        var f = document.createElement('iframe');
                        f.scrolling = isTouch ? 'yes' : 'no';
                        f.allowFullscreen = true;
                        f.style.cssText = getIframeStyle();
                        f.onload = function() { _lo.classList.add('hidden'); };
                        f.src = u;
                        _w.insertBefore(f, shield);
                        _currentIframe = f;
                        _currentSlug = slug;

                        document.querySelectorAll('.vbi-dash-dropdown-item').forEach(function(item) {
                            item.classList.toggle('active', item.getAttribute('data-slug') === slug);
                        });
                        var activeItem = document.querySelector('.vbi-dash-dropdown-item[data-slug="'+slug+'"]');
                        if (activeItem && selectorBtn) {
                            selectorBtn.childNodes[0].textContent = activeItem.getAttribute('data-name') + ' ';
                        }
                        history.pushState(null, '', '/d/' + slug);
                    }
                }
            })
            .catch(function() { window.location.href = '/login'; });
        }

        // Dropdown click — powerbi load inline, non-powerbi navigate
        document.querySelectorAll('.vbi-dash-dropdown-item').forEach(function(item) {
            item.addEventListener('click', function(e) {
                var slug = this.getAttribute('data-slug');
                if (slug === _currentSlug) {
                    e.preventDefault();
                    document.getElementById('vbiDropdown').classList.remove('show');
                    document.getElementById('vbiBackdrop').classList.remove('show');
                    if (selectorBtn) selectorBtn.classList.remove('open');
                    return;
                }
                e.preventDefault();
                document.getElementById('vbiDropdown').classList.remove('show');
                document.getElementById('vbiBackdrop').classList.remove('show');
                if (selectorBtn) selectorBtn.classList.remove('open');
                // Close mobile menu if open
                var mobMenu = document.getElementById('vbiMobMenu');
                var mobOverlay = document.getElementById('vbiMobOverlay');
                if (mobMenu) mobMenu.classList.remove('open');
                if (mobOverlay) mobOverlay.classList.remove('open');

                _lo.classList.remove('hidden');
                if (_currentIframe) { _currentIframe.remove(); _currentIframe = null; }
                fetch('/api/report-url', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: _tk, slug: slug })
                })
                .then(function(r) {
                    if (!r.ok) { window.location.href = '/d/' + slug; return; }
                    return r.json();
                })
                .then(function(data) {
                    if (data && data.d) {
                        var u = _dec(data.d);
                        if (u) {
                            var f = document.createElement('iframe');
                            f.scrolling = isTouch ? 'yes' : 'no';
                            f.allowFullscreen = true;
                            f.style.cssText = getIframeStyle();
                            f.onload = function() { _lo.classList.add('hidden'); };
                            f.src = u;
                            _w.insertBefore(f, shield);
                            _currentIframe = f;
                            _currentSlug = slug;
                            document.querySelectorAll('.vbi-dash-dropdown-item').forEach(function(item) {
                                item.classList.toggle('active', item.getAttribute('data-slug') === slug);
                            });
                            var ai = document.querySelector('.vbi-dash-dropdown-item[data-slug="'+slug+'"]');
                            if (ai && selectorBtn) selectorBtn.childNodes[0].textContent = ai.getAttribute('data-name') + ' ';
                            history.pushState(null, '', '/d/' + slug);
                        }
                    } else {
                        window.location.href = '/d/' + slug;
                    }
                })
                .catch(function() { window.location.href = '/d/' + slug; });
            });
        });

        // Handle orientation changes — update iframe style
        function updateIframeOnResize() {
            if (_currentIframe) {
                _currentIframe.style.cssText = getIframeStyle();
                _currentIframe.scrolling = isTouch ? 'yes' : 'no';
            }
        }
        window.addEventListener('resize', updateIframeOnResize);
        window.addEventListener('orientationchange', function() {
            setTimeout(updateIframeOnResize, 300);
        });

        // Load initial report
        loadReport(_currentSlug);

    })();
    </script>

</body>
</html>
